name: Test & Audit MCP Server

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: '5_Symbols/src/mcp-server/package-lock.json'

    - name: Install MCP Server Dependencies
      run: |
        cd 5_Symbols/src/mcp-server
        npm ci

    - name: Compile TypeScript
      run: |
        cd 5_Symbols/src/mcp-server
        npm run build

    - name: Verify Docker Container Build
      run: |
        cd 5_Symbols/src/mcp-server
        docker build -t enterprise-mcp-server:latest .
