<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Image Generator | Claude AI Certification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #030712;
      --bg-card: rgba(17, 24, 39, 0.9);
      --border-glow: rgba(139, 92, 246, 0.3);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #8b5cf6;
      --primary-glow: rgba(139, 92, 246, 0.6);
      --secondary: #3b82f6;
      --success: #10b981;
      --danger: #ef4444;
      --font-title: 'Outfit', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.12) 0%, transparent 40%);
      color: var(--text-main);
      font-family: var(--font-body);
      line-height: 1.6;
      padding: 100px 24px 60px;
    }

    .container { max-width: 1000px; margin: 0 auto; }

    header { margin-bottom: 60px; text-align: center; }
    header h1 { font-family: var(--font-title); font-size: 3rem; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 10px; }
    header p { font-size: 1.2rem; color: var(--text-muted); }

    .glass-card {
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 40px;
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-muted); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-family: inherit;
    }
    .form-group input:focus { border-color: var(--primary); outline: none; }

    .btn {
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .result-container {
      display: none;
      margin-top: 40px;
      text-align: center;
    }

    .result-image {
      max-width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      margin-bottom: 24px;
    }

    .refined-prompt-box {
      background: rgba(0, 0, 0, 0.4);
      padding: 20px;
      border-radius: 12px;
      text-align: left;
      margin-bottom: 24px;
      border: 1px solid var(--border-glow);
    }

    .refined-prompt-box h3 {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .refined-prompt-box p {
      font-size: 0.95rem;
      color: var(--text-main);
      font-style: italic;
    }

    footer {
      margin-top: 80px;
      text-align: center;
      padding-top: 40px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .nav-links { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
    .nav-links a { color: var(--text-muted); text-decoration: none; font-weight: 600; }
    .nav-links a:hover { color: var(--primary); }

    .loader {
      display: none;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      border-radius: 24px;
      width: 100%;
      max-width: 800px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      padding: 20px 32px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-family: var(--font-title);
      font-size: 1.5rem;
      margin: 0;
    }

    .modal-body {
      padding: 32px;
      overflow-y: auto;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text-main);
    }

    .modal-body h1, .modal-body h2, .modal-body h3 {
      margin-top: 24px;
      margin-bottom: 12px;
      color: var(--primary);
    }

    .modal-body p { margin-bottom: 16px; }

    .modal-body blockquote {
      border-left: 4px solid var(--primary);
      background: rgba(139, 92, 246, 0.1);
      padding: 16px;
      margin: 20px 0;
      border-radius: 0 12px 12px 0;
      font-style: italic;
    }

    .modal-body pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin: 20px 0;
    }

    .close-modal {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
    }
    .close-modal:hover { color: white; }

    .script-btn {
      margin-bottom: 15px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid var(--border-glow);
      color: var(--primary);
      width: 100%;
      justify-content: center;
    }
    .script-btn:hover { background: rgba(139, 92, 246, 0.2); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🖼️ AI Image Generator</h1>
      <p>Generate module assets with Gemini & Azure</p>
    </header>

    <div class="glass-card">
      <button id="view-script-btn" class="btn script-btn" type="button">
        📖 View Production Script
      </button>

      <form id="gen-form">
        <div class="form-grid">
          <div class="form-group">
            <label>Module Number</label>
            <select id="module-number" required>
              <option value="1">Module 1</option>
              <option value="2">Module 2</option>
              <option value="3">Module 3</option>
              <option value="4">Module 4</option>
              <option value="5">Module 5</option>
            </select>
          </div>
          <div class="form-group">
            <label>Video Number</label>
            <select id="video-number" required>
              <option value="1">Video 1</option>
              <option value="2">Video 2</option>
              <option value="3">Video 3</option>
              <option value="4">Video 4</option>
              <option value="5">Video 5</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Image Prompt (What do you want to see?)</label>
          <textarea id="prompt" rows="4" required placeholder="e.g., A futuristic server room with purple neon lights and glass walls reflecting data streams..."></textarea>
        </div>

        <div style="text-align: right;">
          <button type="submit" id="gen-btn" class="btn btn-primary">
            <span id="btn-text">✨ Generate with Gemini</span>
            <div class="loader" id="btn-loader"></div>
          </button>
        </div>
      </form>
    </div>

    <div id="result-container" class="result-container">
      <div class="glass-card">
        <div class="refined-prompt-box">
          <h3>🧠 Refined Gemini Prompt</h3>
          <p id="refined-prompt-text"></p>
        </div>
        
        <img id="result-img" src="" alt="Generated Visual" class="result-image">
        
        <div style="display: flex; justify-content: center; gap: 20px;">
          <button id="save-btn" class="btn btn-success">
            💾 Save to Azure Blob Storage
          </button>
          <button id="reset-btn" class="btn btn-secondary" onclick="resetForm()">
            🔄 Try Another
          </button>
        </div>
        <p id="save-status" style="margin-top: 15px; color: var(--success); display: none;"></p>
      </div>
    </div>

    <!-- Script Modal -->
    <div id="script-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-title">🎬 Production Script</h2>
          <button class="close-modal" onclick="closeModal()">&times;</button>
        </div>
        <div id="modal-body" class="modal-body">
          <div style="text-align: center; padding: 40px;">
            <div class="loader" style="display: inline-block;"></div>
            <p style="margin-top: 15px;">Fetching script...</p>
          </div>
        </div>
      </div>
    </div>

    <footer>
      <p style="font-weight: 800; font-size: 1.1rem; color: white; margin-bottom: 20px;">Claude AI Certification | Asset Production</p>
      <div class="nav-links">
        <a href="post_production_master.html">🎬 Post-Prod Master</a>
        <a href="edit_list.html">📝 Edit List</a>
        <a href="../production_hub.html">🏭 Production Hub</a>
        <a href="../../../index.html">🏠 Home</a>
      </div>
    </footer>
  </div>

  <script src="../../../shared/debug-panel.js"></script>
  <script src="../../../shared/nav.js"></script>

  <script>
    let currentImageData = null;

    // Script Modal Logic
    const modal = document.getElementById('script-modal');
    const modalBody = document.getElementById('modal-body');
    const viewScriptBtn = document.getElementById('view-script-btn');

    viewScriptBtn.addEventListener('click', async () => {
      const moduleNum = document.getElementById('module-number').value;
      modal.style.display = 'flex';
      modalBody.innerHTML = '<div style="text-align: center; padding: 40px;"><div class="loader" style="display: inline-block;"></div><p style="margin-top: 15px;">Fetching script for Module ' + moduleNum + '...</p></div>';

      try {
        // Determine which file to fetch
        let scriptPath = '../../../4_Formula/production/script.md'; // Default fallback
        if (moduleNum === '1') {
          scriptPath = '../../../5_Symbols/production/prod/module_1_plan.md';
        }

        const res = await fetch(scriptPath);
        if (!res.ok) throw new Error('Script file not found');
        const text = await res.text();
        
        // Basic Markdown to HTML conversion
        let html = text
          .replace(/^# (.*$)/gim, '<h1>$1</h1>')
          .replace(/^## (.*$)/gim, '<h2>$1</h2>')
          .replace(/^### (.*$)/gim, '<h3>$1</h3>')
          .replace(/^\> (.*$)/gim, '<blockquote>$1</blockquote>')
          .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
          .replace(/\*(.*)\*/gim, '<em>$1</em>')
          .replace(/\n/g, '<br>');
        
        modalBody.innerHTML = html;
      } catch (err) {
        modalBody.innerHTML = '<div style="color: var(--danger); text-align: center; padding: 40px;">❌ Error: ' + err.message + '</div>';
      }
    });

    function closeModal() {
      modal.style.display = 'none';
    }

    // Close modal on outside click
    window.onclick = function(event) {
      if (event.target == modal) {
        closeModal();
      }
    }

    document.getElementById('gen-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const prompt = document.getElementById('prompt').value;
      const moduleNumber = parseInt(document.getElementById('module-number').value);
      const videoNumber = parseInt(document.getElementById('video-number').value);
      
      const btn = document.getElementById('gen-btn');
      const btnText = document.getElementById('btn-text');
      const loader = document.getElementById('btn-loader');
      
      btn.disabled = true;
      btnText.style.display = 'none';
      loader.style.display = 'block';
      
      try {
        const res = await fetch('/api/images/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, module_number: moduleNumber, video_number: videoNumber })
        });
        
        if (!res.ok) throw new Error('Generation failed');
        
        const data = await res.json();
        currentImageData = data;
        
        document.getElementById('refined-prompt-text').innerText = data.refined_prompt;
        document.getElementById('result-img').src = data.image_url;
        document.getElementById('result-container').style.display = 'block';
        
        // Scroll to result
        window.scrollTo({ top: document.getElementById('result-container').offsetTop - 50, behavior: 'smooth' });
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        btn.disabled = false;
        btnText.style.display = 'block';
        loader.style.display = 'none';
      }
    });

    document.getElementById('save-btn').addEventListener('click', async () => {
      if (!currentImageData) return;
      
      const btn = document.getElementById('save-btn');
      const status = document.getElementById('save-status');
      
      btn.disabled = true;
      btn.innerText = '⌛ Saving...';
      
      try {
        const res = await fetch('/api/images/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            image_url: currentImageData.image_url,
            module_number: currentImageData.module_number,
            video_number: currentImageData.video_number,
            prompt: currentImageData.original_prompt
          })
        });
        
        if (!res.ok) throw new Error('Save failed');
        
        const data = await res.json();
        status.innerText = `✅ Saved as ${data.blob_name} in research-images container!`;
        status.style.display = 'block';
        btn.innerText = '✅ Saved';
      } catch (err) {
        alert('Save Error: ' + err.message);
        btn.disabled = false;
        btn.innerText = '💾 Save to Azure Blob Storage';
      }
    });

    function resetForm() {
      document.getElementById('gen-form').reset();
      document.getElementById('result-container').style.display = 'none';
      document.getElementById('save-btn').disabled = false;
      document.getElementById('save-btn').innerText = '💾 Save to Azure Blob Storage';
      document.getElementById('save-status').style.display = 'none';
      currentImageData = null;
    }
  </script>
</body>
</html>
