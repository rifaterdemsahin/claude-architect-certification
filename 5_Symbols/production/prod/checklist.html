<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Production Checklist — Roll & Voiceover | Claude AI Certification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #030712; --bg-card: rgba(17,24,39,0.85);
      --text-main: #f3f4f6; --text-muted: #9ca3af;
      --primary: #8b5cf6; --secondary: #3b82f6; --success: #10b981;
      --warning: #f59e0b; --danger: #ef4444;
      --font-title: 'Outfit', sans-serif; --font-body: 'Plus Jakarta Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-dark);
      background-image: radial-gradient(circle at 10% 20%, rgba(139,92,246,0.08) 0%, transparent 40%);
      color: var(--text-main); font-family: var(--font-body); line-height: 1.6; padding-bottom: 80px;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }
    header { padding: 40px 0 24px; text-align: center; }
    h1 { font-family: var(--font-title); font-size: 2.2rem; font-weight: 800; margin-bottom: 6px; }
    header p { color: var(--text-muted); font-size: 0.95rem; }

    /* Tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab { padding: 12px 24px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: all 0.3s; background: transparent; color: var(--text-muted); }
    .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    .tab:hover { border-color: var(--primary); }

    /* Stats bar */
    .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 16px 24px; flex: 1; min-width: 120px; text-align: center; }
    .stat-num { font-family: var(--font-title); font-size: 1.8rem; font-weight: 800; }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

    /* Sync badge */
    .sync-bar { display: flex; align-items: center; gap: 12px; background: var(--bg-card); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 18px; margin-bottom: 24px; }
    .sync-badge { padding: 3px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    .sync-badge.connected { background: rgba(16,185,129,0.15); color: #10b981; }
    .sync-badge.saving { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .sync-badge.error { background: rgba(239,68,68,0.15); color: #ef4444; }

    /* Checklist item */
    .checklist { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .check-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; background: rgba(0,0,0,0.2); transition: all 0.2s; }
    .check-item:hover { background: rgba(139,92,246,0.06); }
    .check-box { width: 20px; height: 20px; border-radius: 5px; accent-color: var(--success); cursor: pointer; flex-shrink: 0; }
    .item-name { flex: 1; font-size: 0.9rem; }
    .item-desc { font-size: 0.75rem; color: var(--text-muted); }
    .item-actions { display: flex; gap: 4px; }
    .item-btn { background: none; border: 1px solid rgba(255,255,255,0.08); color: var(--text-muted); padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; transition: all 0.2s; }
    .item-btn:hover { border-color: var(--primary); color: var(--primary); }
    .item-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

    /* Add form */
    .add-form { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
    .add-form input { flex: 1; min-width: 200px; background: rgba(3,7,18,0.8); color: white; border: 2px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 14px; font-family: var(--font-body); font-size: 0.9rem; outline: none; }
    .add-form input:focus { border-color: var(--primary); }
    .add-btn { background: linear-gradient(135deg, var(--success), #059669); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.85rem; }

    /* Edit modal */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3,7,18,0.85); backdrop-filter: blur(6px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--bg-card); border: 1px solid rgba(139,92,246,0.3); border-radius: 24px; padding: 32px; max-width: 500px; width: 100%; }
    .modal-box h2 { font-family: var(--font-title); margin-bottom: 16px; }
    .modal-box input, .modal-box textarea { width: 100%; margin-bottom: 12px; background: rgba(3,7,18,0.8); color: white; border: 2px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 14px; font-family: var(--font-body); font-size: 0.9rem; outline: none; }
    .modal-box textarea { min-height: 70px; resize: vertical; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* Phase groups */
    .phase-section { margin-bottom: 32px; }
    .phase-title { font-family: var(--font-title); font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

    .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.95rem; }
    .empty-state p { margin-bottom: 12px; }

    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 12px; font-weight: 600; z-index: 2000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    #toast.show { opacity: 1; }
    #toast.error-toast { background: rgba(239,68,68,0.9); }

    @media (max-width: 600px) { .tabs { flex-direction: column; } .tab { text-align: center; } }
  </style>
</head>
<body>
  <div id="toast">✅ Saved</div>
  <div class="container">
    <header>
      <h1>🎬 Production Checklist</h1>
      <p>Pre-roll and voiceover checks — CRUD synced to Supabase</p>
    </header>

    <div class="sync-bar">
      <span>⚡ Supabase</span>
      <span id="syncBadge" class="sync-badge connected">☁️ Connected</span>
      <span style="flex:1;text-align:right;font-size:0.8rem;color:var(--text-muted)" id="syncInfo"></span>
    </div>

    <div class="stats" id="statsRow"></div>

    <div class="tabs" id="tabBar">
      <button class="tab active" data-phase="Production Roll">🎬 Pre-Roll Checklist</button>
      <button class="tab" data-phase="Production Voiceover">🎤 Voiceover Checklist</button>
    </div>

    <div id="checklistContainer"></div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-box">
      <h2 id="modalTitle">✏️ Edit Item</h2>
      <input type="hidden" id="editItemId">
      <input type="hidden" id="editPhase">
      <input type="text" id="editName" placeholder="Item name">
      <textarea id="editDesc" placeholder="Description (optional)"></textarea>
      <div class="modal-actions">
        <button class="item-btn" onclick="closeEditModal()">Cancel</button>
        <button class="add-btn" onclick="saveEdit()">💾 Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL  = 'https://rmekfsdhglyiralxvkwc.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZWtmc2RoZ2x5aXJhbHh2a3djIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzYzODgsImV4cCI6MjA5NjM1MjM4OH0.ay6HsmO_CbMGDXL_Dv4DT-paAIAOqlQPfmqqx_mexSU';
    const USER_ID = 'default';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    let currentPhase = 'Production Roll';
    let itemsCache = [];

    // ── Seed data: auto-inserted when DB is empty ──
    const SEED_DATA = [
      { phase: 'Production Roll', item_name: '💡 Lighting check', item_desc: 'Key light, fill light, and backlight positioned correctly. No harsh shadows on face or screen.', sort_order: 1 },
      { phase: 'Production Roll', item_name: '🎤 Audio levels verified', item_desc: 'Microphone input level between -12dB and -6dB. No peaking or clipping.', sort_order: 2 },
      { phase: 'Production Roll', item_name: '🔇 Ambient noise check', item_desc: 'Listen for background hum, fan noise, traffic, or echo. Record 10s room tone.', sort_order: 3 },
      { phase: 'Production Roll', item_name: '📹 Screen recording software open', item_desc: 'OBS / Screen Studio / QuickTime configured at 1920x1080 30fps. Preview window positioned.', sort_order: 4 },
      { phase: 'Production Roll', item_name: '📄 Script / teleprompter ready', item_desc: 'Script visible on second monitor or teleprompter app open and scrolling.', sort_order: 5 },
      { phase: 'Production Roll', item_name: '🖥️ VS Code / IDE prepared', item_desc: 'Correct project folder open, font size 16-18px, terminal clean, relevant files open.', sort_order: 6 },
      { phase: 'Production Roll', item_name: '🌐 Browser tabs closed', item_desc: 'Close personal tabs, messaging apps, notifications. Only production tabs remain.', sort_order: 7 },
      { phase: 'Production Roll', item_name: '🎧 Headphones on', item_desc: 'Monitor live audio with closed-back headphones to prevent echo bleed.', sort_order: 8 },
      { phase: 'Production Roll', item_name: '📋 Recording checklist reviewed', item_desc: 'Run through all roll items one more time before pressing record.', sort_order: 9 },

      { phase: 'Production Voiceover', item_name: '🎙️ Microphone test recorded', item_desc: 'Record 15s test clip. Play back and verify clarity, plosives, sibilance.', sort_order: 1 },
      { phase: 'Production Voiceover', item_name: '🔊 Gain staging set', item_desc: 'Pre-amp gain set so loudest passages hit -3dB max. No distortion.', sort_order: 2 },
      { phase: 'Production Voiceover', item_name: '🔇 Noise floor acceptable', item_desc: 'Room tone below -50dB. No electrical hum, HVAC rumble, or fan noise.', sort_order: 3 },
      { phase: 'Production Voiceover', item_name: '📝 Script printed / on screen', item_desc: 'Full script visible with cue marks for emphasis, pauses, and section breaks.', sort_order: 4 },
      { phase: 'Production Voiceover', item_name: '💧 Water / hydration ready', item_desc: 'Room-temperature water within reach to prevent mouth clicks.', sort_order: 5 },
      { phase: 'Production Voiceover', item_name: '📏 Mouth-to-mic distance consistent', item_desc: '6-8 inches from mic with pop filter. Consistent throughout recording.', sort_order: 6 },
      { phase: 'Production Voiceover', item_name: '🔁 Warm-up vocal exercises done', item_desc: '2 minutes of humming, lip trills, and tongue twisters before recording.', sort_order: 7 },
      { phase: 'Production Voiceover', item_name: '📂 Recording folder set', item_desc: 'Output folder created per module/section. File naming convention ready.', sort_order: 8 },
      { phase: 'Production Voiceover', item_name: '🎧 Monitor mix confirmed', item_desc: 'Headphone mix has clean microphone feed. No latency or reverb in cans.', sort_order: 9 },
    ];

    // ── Toast ──
    function showToast(msg, isError) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.classList.toggle('error-toast', isError);
      el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2000);
    }

    function setBadge(state) {
      const b = document.getElementById('syncBadge');
      const m = { connected: ['connected','☁️ Connected'], saving: ['saving','⏳ Saving…'], error: ['error','❌ Error'] };
      const [c,l] = m[state] || m.connected;
      b.className = 'sync-badge ' + c; b.textContent = l;
    }

    // ── Data ──
    async function loadItems() {
      const { data: items, error } = await db
        .from('checklist_items')
        .select('*')
        .in('phase', ['Production Roll', 'Production Voiceover'])
        .order('sort_order');
      if (error) { showToast('❌ Load failed: ' + error.message, true); return []; }

      // Auto-seed if database is empty
      if (!items || items.length === 0) {
        setBadge('saving');
        try {
          const { error: seedErr } = await db.from('checklist_items').insert(SEED_DATA);
          if (seedErr) throw seedErr;
          showToast('🌱 Seeded default checklist items');
          return loadItems(); // recurse to load freshly inserted data
        } catch (err) {
          showToast('❌ Seed failed: ' + err.message, true);
          return SEED_DATA.map(s => ({ ...s, id: 0, prog: { checked: false, notes: '' } }));
        }
      }

      const { data: progress } = await db
        .from('checklist_progress')
        .select('*')
        .eq('user_id', USER_ID);
      const progMap = {};
      (progress || []).forEach(p => progMap[p.item_id] = p);
      return (items || []).map(i => ({ ...i, prog: progMap[i.id] || { checked: false, notes: '' } }));
    }

    async function render() {
      document.getElementById('checklistContainer').innerHTML = '<p style="text-align:center;padding:40px;color:var(--text-muted)">🔄 Loading...</p>';
      itemsCache = await loadItems();
      document.getElementById('syncInfo').textContent = `${itemsCache.length} items loaded`;
      renderPhase(currentPhase);
      renderStats();
    }

    function renderPhase(phase) {
      currentPhase = phase;
      const items = itemsCache.filter(i => i.phase === phase).sort((a,b) => (a.sort_order||0) - (b.sort_order||0));
      const done = items.filter(i => i.prog.checked).length;
      const container = document.getElementById('checklistContainer');

      if (!items.length) {
        container.innerHTML = `
          <div class="empty-state">
            <p>🎬 No checklist items for <strong>${phase}</strong> yet.</p>
            <p style="font-size:0.85rem;">Add one below to get started.</p>
          </div>
          <div class="add-form" id="addForm">
            <input type="text" id="addName" placeholder="e.g. Check microphone levels">
            <input type="text" id="addDesc" placeholder="Description (optional)">
            <button class="add-btn" onclick="addItem()">+ Add Item</button>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <div class="phase-section">
          <div class="phase-title">${phase === 'Production Roll' ? '🎬' : '🎤'} ${phase} <span style="font-size:0.85rem;color:var(--text-muted);font-weight:400;margin-left:8px;">${done}/${items.length}</span></div>
          <ul class="checklist">${items.map(item => {
            const checked = item.prog.checked || false;
            return `<li class="check-item">
              <input type="checkbox" class="check-box" data-id="${item.id}" ${checked ? 'checked' : ''} onchange="toggleItem(${item.id}, this.checked)">
              <div style="flex:1">
                <div class="item-name" style="${checked ? 'text-decoration:line-through;opacity:0.6' : ''}">${item.item_name}</div>
                ${item.item_desc ? `<div class="item-desc">${item.item_desc}</div>` : ''}
              </div>
              <div class="item-actions">
                <button class="item-btn" onclick="openEditModal(${item.id},'${item.item_name.replace(/'/g,"\\'")}','${(item.item_desc||'').replace(/'/g,"\\'")}','${phase}')">✏️ Edit</button>
                <button class="item-btn danger" onclick="deleteItem(${item.id})">🗑</button>
              </div>
            </li>`;
          }).join('')}</ul>
          <div class="add-form">
            <input type="text" id="addName" placeholder="e.g. ${phase === 'Production Roll' ? 'Screen recording software open' : 'Microphone test recorded'}">
            <input type="text" id="addDesc" placeholder="Description (optional)">
            <button class="add-btn" onclick="addItem()">+ Add Item</button>
          </div>
        </div>`;
    }

    function renderStats() {
      const total = itemsCache.length;
      const done = itemsCache.filter(i => i.prog.checked).length;
      const roll = itemsCache.filter(i => i.phase === 'Production Roll');
      const vo   = itemsCache.filter(i => i.phase === 'Production Voiceover');
      const rDone = roll.filter(i => i.prog.checked).length;
      const vDone = vo.filter(i => i.prog.checked).length;
      document.getElementById('statsRow').innerHTML = `
        <div class="stat-card"><div class="stat-num" style="color:var(--success)">${done}/${total}</div><div class="stat-label">✅ Complete</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--secondary)">${rDone}/${roll.length}</div><div class="stat-label">🎬 Roll</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--warning)">${vDone}/${vo.length}</div><div class="stat-label">🎤 Voiceover</div></div>
      `;
    }

    // ── Tabs ──
    document.getElementById('tabBar').addEventListener('click', e => {
      const tab = e.target.closest('.tab');
      if (!tab) return;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentPhase = tab.dataset.phase;
      renderPhase(currentPhase);
      renderStats();
    });

    // ── Toggle check ──
    async function toggleItem(itemId, checked) {
      setBadge('saving');
      try {
        const { error } = await db.from('checklist_progress').upsert(
          { item_id: itemId, user_id: USER_ID, checked, notes: '', updated_at: new Date().toISOString() },
          { onConflict: 'item_id,user_id' }
        );
        if (error) throw error;
        setBadge('connected'); showToast('✅ Saved');
        const item = itemsCache.find(i => i.id === itemId);
        if (item) item.prog.checked = checked;
        renderStats();
      } catch (err) { setBadge('error'); showToast('❌ ' + err.message, true); }
    }

    // ── Add item ──
    async function addItem() {
      const name = document.getElementById('addName').value.trim();
      const desc = document.getElementById('addDesc').value.trim();
      if (!name) { showToast('❌ Item name required', true); return; }
      setBadge('saving');
      try {
        const maxSort = itemsCache.filter(i => i.phase === currentPhase).length;
        const { error } = await db.from('checklist_items').insert({
          phase: currentPhase, item_name: name, item_desc: desc, sort_order: maxSort + 1
        });
        if (error) throw error;
        document.getElementById('addName').value = '';
        document.getElementById('addDesc').value = '';
        showToast('✅ Item added');
        await render();
      } catch (err) { setBadge('error'); showToast('❌ ' + err.message, true); }
    }

    // ── Edit modal ──
    function openEditModal(id, name, desc, phase) {
      document.getElementById('editItemId').value = id;
      document.getElementById('editPhase').value = phase;
      document.getElementById('editName').value = name;
      document.getElementById('editDesc').value = desc;
      document.getElementById('modalTitle').textContent = '✏️ Edit Item';
      document.getElementById('editModal').classList.add('open');
    }
    function closeEditModal() { document.getElementById('editModal').classList.remove('open'); }

    async function saveEdit() {
      const id = parseInt(document.getElementById('editItemId').value);
      const name = document.getElementById('editName').value.trim();
      const desc = document.getElementById('editDesc').value.trim();
      if (!name) { showToast('❌ Name required', true); return; }
      setBadge('saving');
      try {
        const { error } = await db.from('checklist_items').update({ item_name: name, item_desc: desc }).eq('id', id);
        if (error) throw error;
        closeEditModal(); showToast('✅ Updated'); await render();
      } catch (err) { setBadge('error'); showToast('❌ ' + err.message, true); }
    }

    // ── Delete item ──
    async function deleteItem(id) {
      if (!confirm('Delete this checklist item?')) return;
      setBadge('saving');
      try {
        const { error } = await db.from('checklist_items').delete().eq('id', id);
        if (error) throw error;
        showToast('🗑 Deleted'); await render();
      } catch (err) { setBadge('error'); showToast('❌ ' + err.message, true); }
    }

    // ── Init ──
    render();
  </script>
</body>
</html>
