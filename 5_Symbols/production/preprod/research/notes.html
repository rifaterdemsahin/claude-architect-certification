<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📝 Research Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../../shared/nav.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #030712; --card: rgba(17,24,39,0.9); --border: rgba(139,92,246,0.2);
      --text: #f3f4f6; --muted: #9ca3af; --primary: #8b5cf6; --green: #10b981;
      --red: #ef4444; --blue: #3b82f6;
      --font-h: 'Outfit', sans-serif; --font-b: 'Plus Jakarta Sans', sans-serif;
      --font-mono: 'Fira Mono', 'Consolas', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-b); line-height: 1.6; padding: 32px 24px 120px; }
    .container { max-width: 860px; margin: 0 auto; }
    h1 { font-family: var(--font-h); font-size: 2.2rem; font-weight: 800; margin-bottom: 6px; }
    .subtitle { color: var(--muted); margin-bottom: 28px; }
    .status-bar { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; margin-bottom: 24px; font-size: 0.85rem; }
    /* Editor */
    .editor-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; margin-bottom: 28px; }
    .editor-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .editor-header label { font-size: 0.85rem; color: var(--muted); white-space: nowrap; }
    .filename-input { flex: 1; min-width: 200px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 9px; padding: 7px 12px; color: var(--text); font-size: 0.88rem; font-family: var(--font-mono); outline: none; }
    .filename-input:focus { border-color: var(--primary); }
    textarea#note-body { width: 100%; min-height: 240px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px 16px; color: var(--text); font-size: 0.92rem; font-family: var(--font-mono); line-height: 1.7; resize: vertical; outline: none; }
    textarea#note-body:focus { border-color: var(--primary); }
    .editor-footer { display: flex; gap: 8px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
    .btn { padding: 9px 18px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; font-size: 0.88rem; transition: all 0.2s; font-family: var(--font-b); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #7c3aed; }
    .btn-ghost-lg { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid rgba(255,255,255,0.08); }
    .btn-ghost-lg:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .save-status { font-size: 0.82rem; color: var(--muted); }
    /* Note list */
    .section-title { font-family: var(--font-h); font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
    .note-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; margin-bottom: 12px; cursor: pointer; transition: border-color 0.15s; }
    .note-card:hover { border-color: rgba(139,92,246,0.5); }
    .note-card.active { border-color: var(--primary); background: rgba(139,92,246,0.08); }
    .note-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .note-name { font-weight: 700; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-meta { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
    .note-preview { font-size: 0.82rem; color: var(--muted); font-family: var(--font-mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-actions { display: flex; gap: 6px; margin-top: 10px; }
    .btn-sm { padding: 4px 12px; border-radius: 7px; border: none; cursor: pointer; font-size: 0.75rem; font-weight: 600; font-family: var(--font-b); transition: all 0.2s; }
    .btn-blue { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }
    .btn-blue:hover { background: rgba(59,130,246,0.25); }
    .btn-ghost { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid rgba(255,255,255,0.08); text-decoration: none; display: inline-flex; align-items: center; }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .btn-danger { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .btn-danger:hover { background: rgba(239,68,68,0.22); }
    .empty-state { text-align: center; color: var(--muted); padding: 48px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 18px; font-size: 0.88rem; z-index: 1000; max-width: 340px; transition: opacity 0.3s; }
    .toast.error { border-color: rgba(239,68,68,0.4); }
    .toast.success { border-color: rgba(16,185,129,0.4); }
  </style>
</head>
<body>
<script src="../../../../shared/nav.js"></script>
<div class="container">
  <h1>📝 Research Notes</h1>
  <p class="subtitle">Write and save research notes as Markdown files in Azure Blob Storage.</p>

  <!-- Navigation Mode Bar -->
  <div class="creation-modes" style="display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;">
    <a href="index.html" class="btn-sm btn-ghost" style="padding: 8px 16px; border-radius: 10px; font-weight: 700;">← Hub</a>
    <a href="images.html" class="btn-sm btn-ghost" style="padding: 8px 16px; border-radius: 10px; font-weight: 700;">🖼 Image Mode</a>
    <a href="audio.html" class="btn-sm btn-ghost" style="padding: 8px 16px; border-radius: 10px; font-weight: 700;">🎵 Audio Mode</a>
    <a href="videos.html" class="btn-sm btn-ghost" style="padding: 8px 16px; border-radius: 10px; font-weight: 700;">🎬 Video Mode</a>
    <a href="notes.html" class="btn-sm" style="padding: 8px 16px; border-radius: 10px; font-weight: 700; background: rgba(139,92,246,0.15); border-color: var(--primary); color: var(--text);">📝 Note Mode</a>
  </div>

  <div class="status-bar" id="status-bar">⏳ Connecting…</div>

  <!-- Video filter banner (shown when ?video= param is present) -->
  <div id="video-filter-banner" style="display:none; background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.25); border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
    <div style="display: flex; align-items: center; gap: 8px; font-size: 0.88rem; font-weight: 600;">
      <span>🎬</span>
      <span id="video-filter-label">Showing items linked to video</span>
    </div>
    <div style="display: flex; gap: 8px; align-items: center;">
      <span style="font-size: 0.78rem; color: var(--muted);" id="video-filter-count"></span>
      <a href="notes.html" style="font-size: 0.78rem; color: var(--muted); text-decoration: none; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 6px;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">✕ Clear filter</a>
    </div>
  </div>

  <div class="editor-card">
    <div class="editor-header">
      <label for="filename-input">📄 Filename:</label>
      <input class="filename-input" id="filename-input" type="text" placeholder="note-2026-06-12.md" spellcheck="false">
    </div>
    <textarea id="note-body" placeholder="# Research Note&#10;&#10;Write your notes here in Markdown…&#10;&#10;## Key Points&#10;- "></textarea>
    <div class="editor-footer">
      <button class="btn btn-primary" onclick="saveNote()">💾 Save Note</button>
      <button class="btn btn-ghost-lg" onclick="newNote()">➕ New</button>
      <span class="save-status" id="save-status"></span>
    </div>
  </div>

  <div class="section-title">🗒 Saved Notes <span id="count" style="color:var(--muted);font-size:0.85rem;font-weight:400"></span></div>
  <div id="list"><div class="empty-state">Loading…</div></div>
</div>

<div class="toast" id="toast" style="opacity:0;pointer-events:none"></div>

<script>
const CONTAINER = 'research-notes';
let _toastTimer;

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '');
  el.style.opacity = '1';
  el.style.pointerEvents = 'auto';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.style.opacity = '0'; el.style.pointerEvents = 'none'; }, 3500);
}

function defaultFilename() {
  const d = new Date();
  return 'note-' + d.toISOString().slice(0,10) + '-' + d.toTimeString().slice(0,8).replace(/:/g,'-') + '.md';
}

function newNote() {
  document.getElementById('filename-input').value = defaultFilename();
  document.getElementById('note-body').value = '';
  document.getElementById('save-status').textContent = '';
  document.querySelectorAll('.note-card.active').forEach(el => el.classList.remove('active'));
  document.getElementById('note-body').focus();
}

function saveNote() {
  let name = document.getElementById('filename-input').value.trim();
  if (!name) name = defaultFilename();
  if (!name.endsWith('.md') && !name.endsWith('.txt')) name += '.md';
  document.getElementById('filename-input').value = name;

  const content = document.getElementById('note-body').value;
  const blob = new Blob([content], { type: 'text/markdown' });
  const fd = new FormData();
  fd.append('file', blob, name);

  document.getElementById('save-status').textContent = '⏳ Saving…';
  fetch('/api/research/upload?container=' + CONTAINER, { method: 'POST', body: fd })
    .then(r => r.ok ? r.json() : r.text().then(t => Promise.reject(t)))
    .then(() => {
      document.getElementById('save-status').textContent = '✅ Saved';
      toast('Saved: ' + name, 'success');
      loadList();
    })
    .catch(e => {
      document.getElementById('save-status').textContent = '❌ Error';
      toast('Save failed: ' + e, 'error');
    });
}

function loadNote(name) {
  fetch('/api/research/file?container=' + CONTAINER + '&name=' + encodeURIComponent(name))
    .then(r => r.ok ? r.text() : r.text().then(t => Promise.reject(t)))
    .then(text => {
      document.getElementById('filename-input').value = name;
      document.getElementById('note-body').value = text;
      document.getElementById('save-status').textContent = '📂 Loaded';
      document.querySelectorAll('.note-card.active').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.note-card').forEach(el => { if (el.dataset.name === name) el.classList.add('active'); });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    })
    .catch(e => toast('Load failed: ' + e, 'error'));
}

function deleteFile(name) {
  if (!confirm('Delete ' + name + '?')) return;
  fetch('/api/research/file?container=' + CONTAINER + '&name=' + encodeURIComponent(name), { method: 'DELETE' })
    .then(r => {
      if (r.ok || r.status === 204) {
        toast('Deleted: ' + name, 'success');
        const active = document.querySelector('.note-card.active');
        if (active && active.dataset.name === name) newNote();
        loadList();
      } else toast('Delete failed', 'error');
    })
    .catch(e => toast('Delete error: ' + e.message, 'error'));
}

function loadList() {
  fetch('/api/research/files?container=' + CONTAINER)
    .then(r => r.json())
    .then(files => {
      const list = document.getElementById('list');
      document.getElementById('count').textContent = '(' + files.length + ')';
      if (!files || files.length === 0) { list.innerHTML = '<div class="empty-state">No notes yet — write one above.</div>'; return; }
      list.innerHTML = '';
      files.slice().reverse().forEach(f => {
        const card = document.createElement('div');
        card.className = 'note-card';
        card.dataset.name = f.name;
        const relMarkup = renderRelationsMarkup(CONTAINER, f.name);
        card.innerHTML = `
          <div class="note-card-header">
            <div class="note-name">📄 ${f.name}</div>
            <div class="note-meta">${f.lastModified || ''}</div>
          </div>
          <div class="note-preview" id="preview-${CSS.escape(f.name)}">Loading preview…</div>
          <div style="margin-top:12px;">${relMarkup}</div>
          <div class="note-actions">
            <button class="btn-sm btn-blue" onclick="loadNote('${f.name.replace(/'/g,"\\'")}')">✏️ Edit</button>
            <a class="btn-sm btn-ghost" href="/api/research/file?container=${CONTAINER}&name=${encodeURIComponent(f.name)}" download="${f.name}">⬇ Download</a>
            <button class="btn-sm btn-danger" onclick="deleteFile('${f.name.replace(/'/g,"\\'")}')">🗑 Delete</button>
          </div>`;
        list.appendChild(card);
        // Load preview snippet
        fetch('/api/research/file?container=' + CONTAINER + '&name=' + encodeURIComponent(f.name))
          .then(r => r.text())
          .then(text => {
            const previewEl = document.getElementById('preview-' + CSS.escape(f.name));
            if (previewEl) previewEl.textContent = text.trim().slice(0, 120) || '(empty)';
          })
          .catch(() => {});
      });
      updateAllRelationsUI();
    })
    .catch(e => { document.getElementById('list').innerHTML = '<div class="empty-state">Failed to load: ' + e.message + '</div>'; });
}

// Init
document.getElementById('filename-input').value = defaultFilename();
document.getElementById('status-bar').textContent = '🟢 Connected to Azure Storage — research-notes';

// ── Supabase & Relations Logic ─────────────────────────────────────────────
const SUPABASE_URL = 'https://rmekfsdhglyiralxvkwc.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZWtmc2RoZ2x5aXJhbHh2a3djIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzYzODgsImV4cCI6MjA5NjM1MjM4OH0.ay6HsmO_CbMGDXL_Dv4DT-paAIAOqlQPfmqqx_mexSU';
const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let allVideos = [];
let allRelationships = [];
let allSentences = [];

async function loadSupabaseData() {
  const [
    { data: vids,  error: err1 },
    { data: rels,  error: err2 },
    { data: sents, error: err3 }
  ] = await Promise.all([
    client.from('course_videos').select('id, title, video_number, course_modules(module_number)').order('id'),
    client.from('research_relationships').select('*'),
    client.from('sentences').select('id, sentence_type, section, sentence_text, script_id').order('sort_order')
  ]);

  if (err1) console.error('Error loading course videos:', err1);
  else allVideos = vids || [];

  if (err2) console.error('Error loading relationships:', err2);
  else allRelationships = rels || [];

  if (err3) console.error('Error loading sentences:', err3);
  else allSentences = sents || [];

  updateAllRelationsUI();
}

function renderRelationsMarkup(container, fileName) {
  const dropId     = `drop-${container}-${CSS.escape(fileName)}`;
  const listId     = `list-${container}-${CSS.escape(fileName)}`;
  const sentDropId = `sent-drop-${container}-${CSS.escape(fileName)}`;
  const sentListId = `sent-list-${container}-${CSS.escape(fileName)}`;
  const safeFile   = fileName.replace(/'/g, "\\'");
  return `
    <div style="margin-top:8px; padding-top:6px; border-top:1px solid rgba(255,255,255,0.06); text-align:left;">
      <div style="font-size:0.7rem; font-weight:bold; color:var(--muted); margin-bottom:4px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:4px;">
        <span>📝 Link to Script:</span>
        <select id="${dropId}" onchange="linkAssetToVideo('${container}', '${safeFile}', this)" style="background:rgba(255,255,255,0.08); border:1px solid var(--border); border-radius:4px; color:var(--text); font-size:0.65rem; padding:1px 3px; outline:none; max-width: 140px; cursor:pointer;">
          <option value="">-- link video --</option>
        </select>
      </div>
      <div id="${listId}" data-container="${container}" data-name="${fileName}" style="display:flex; flex-wrap:wrap; gap:4px; margin-top:4px;">
        <span style="font-size:0.65rem; color:var(--muted)">None linked</span>
      </div>

      <div style="margin-top:6px; padding-top:5px; border-top:1px solid rgba(255,255,255,0.04); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:4px;">
        <span style="font-size:0.7rem; font-weight:bold; color:var(--muted);">📋 Link to Sentence:</span>
        <select id="${sentDropId}" onchange="linkAssetToSentence('${container}', '${safeFile}', this)" style="background:rgba(255,255,255,0.08); border:1px solid rgba(59,130,246,0.3); border-radius:4px; color:var(--text); font-size:0.65rem; padding:1px 3px; outline:none; max-width: 140px; cursor:pointer;">
          <option value="">-- choose sentence --</option>
        </select>
      </div>
      <div id="${sentListId}" data-container="${container}" data-name="${fileName}" data-kind="sentence" style="display:flex; flex-wrap:wrap; gap:4px; margin-top:4px;">
        <span style="font-size:0.65rem; color:var(--muted)">None linked</span>
      </div>
    </div>
  `;
}

function updateAllRelationsUI() {
  // Video dropdowns
  document.querySelectorAll('select[id^="drop-"]').forEach(select => {
    const currentVal = select.value;
    select.innerHTML = '<option value="">-- link video --</option>' + allVideos.map(v => {
      const modNum = v.course_modules ? v.course_modules.module_number : '?';
      return `<option value="${v.id}">M${modNum} V${v.video_number}: ${v.title}</option>`;
    }).join('');
    select.value = currentVal;
  });

  // Sentence dropdowns
  document.querySelectorAll('select[id^="sent-drop-"]').forEach(select => {
    const currentVal = select.value;
    select.innerHTML = '<option value="">-- choose sentence --</option>' + allSentences.map(s => {
      const preview = s.sentence_text.length > 48 ? s.sentence_text.slice(0, 48) + '…' : s.sentence_text;
      return `<option value="${s.id}">[${s.sentence_type}] ${preview}</option>`;
    }).join('');
    select.value = currentVal;
  });

  // Video link badges
  document.querySelectorAll('div[id^="list-"]:not([data-kind])').forEach(el => {
    const container = el.dataset.container;
    const name = el.dataset.name;
    if (!container || !name) return;
    const matchedRels = allRelationships.filter(r => r.container === container && r.item_name === name && r.video_id != null);
    if (!matchedRels.length) { el.innerHTML = '<span style="font-size:0.65rem; color:var(--muted)">None linked</span>'; return; }
    el.innerHTML = matchedRels.map(r => {
      const vidInfo = allVideos.find(v => v.id === r.video_id);
      let label = `Vid #${r.video_id}`;
      let scriptUrl = '../scripts/index.html';
      if (vidInfo) {
        const modNum = vidInfo.course_modules ? vidInfo.course_modules.module_number : '?';
        label = `M${modNum} V${vidInfo.video_number}`;
        scriptUrl = `../scripts/index.html?module=${modNum}`;
      }
      return `<span style="display:inline-flex;align-items:center;gap:3px;background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);border-radius:4px;padding:2px 4px;font-size:0.65rem;color:var(--text);">
        <a href="${scriptUrl}" style="color:inherit;text-decoration:none;" onmouseover="this.style.color='#c084fc'" onmouseout="this.style.color='inherit'">📝 ${label}</a>
        <span style="cursor:pointer;font-weight:bold;color:var(--muted);font-size:0.75rem;" onclick="unlinkAssetFromVideo('${container}','${name.replace(/'/g,"\\'")}',${r.video_id},event)">✕</span>
      </span>`;
    }).join('');
  });

  // Sentence link badges
  document.querySelectorAll('div[id^="sent-list-"]').forEach(el => {
    const container = el.dataset.container;
    const name = el.dataset.name;
    if (!container || !name) return;
    const matchedRels = allRelationships.filter(r => r.container === container && r.item_name === name && r.sentence_id != null);
    if (!matchedRels.length) { el.innerHTML = '<span style="font-size:0.65rem; color:var(--muted)">None linked</span>'; return; }
    el.innerHTML = matchedRels.map(r => {
      const sent = allSentences.find(s => s.id === r.sentence_id);
      const preview = sent ? `${sent.sentence_type}: ${sent.sentence_text.slice(0, 36)}…` : `#${r.sentence_id}`;
      return `<span style="display:inline-flex;align-items:center;gap:3px;background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);border-radius:4px;padding:2px 4px;font-size:0.65rem;color:var(--text);" title="${sent ? sent.sentence_text.replace(/"/g,'&quot;') : ''}">
        📋 ${preview}
        <span style="cursor:pointer;font-weight:bold;color:var(--muted);font-size:0.75rem;" onclick="unlinkAssetFromSentence('${container}','${name.replace(/'/g,"\\'")}',${r.sentence_id},event)">✕</span>
      </span>`;
    }).join('');
  });
}

async function linkAssetToVideo(container, itemName, select) {
  const videoId = parseInt(select.value, 10);
  if (isNaN(videoId)) return;
  const { error } = await client.from('research_relationships').insert({ container, item_name: itemName, video_id: videoId });
  if (error) alert('Link failed: ' + error.message);
  else { allRelationships.push({ container, item_name: itemName, video_id: videoId }); updateAllRelationsUI(); }
  select.value = "";
}

async function unlinkAssetFromVideo(container, itemName, videoId, e) {
  if (e) e.stopPropagation();
  const { error } = await client.from('research_relationships').delete().match({ container: container, item_name: itemName, video_id: videoId });
  if (error) alert('Unlink failed: ' + error.message);
  else { allRelationships = allRelationships.filter(r => !(r.container === container && r.item_name === itemName && r.video_id === videoId)); updateAllRelationsUI(); }
}

async function linkAssetToSentence(container, itemName, select) {
  const sentenceId = parseInt(select.value, 10);
  if (isNaN(sentenceId)) return;
  const { data, error } = await client.from('research_relationships').insert({ container, item_name: itemName, video_id: null, sentence_id: sentenceId }).select();
  if (error) alert('Link failed: ' + error.message);
  else { allRelationships.push(...(data || [{ container, item_name: itemName, sentence_id: sentenceId }])); updateAllRelationsUI(); }
  select.value = '';
}

async function unlinkAssetFromSentence(container, itemName, sentenceId, e) {
  if (e) e.stopPropagation();
  const { error } = await client.from('research_relationships').delete().eq('container', container).eq('item_name', itemName).eq('sentence_id', sentenceId);
  if (error) alert('Unlink failed: ' + error.message);
  else { allRelationships = allRelationships.filter(r => !(r.container === container && r.item_name === itemName && r.sentence_id === sentenceId)); updateAllRelationsUI(); }
}

function applyVideoFilter(videoId, countEl) {
  const matchedRels = allRelationships.filter(r => String(r.video_id) === String(videoId));
  let matched = 0;
  document.querySelectorAll('.note-card').forEach(card => {
    const nameEl = card.querySelector('.note-name');
    if (!nameEl) return;
    const name = nameEl.textContent.replace(/^📄\s*/, '').trim();
    const isLinked = matchedRels.some(r => r.item_name === name);
    if (isLinked) {
      card.style.border = '1px solid rgba(59,130,246,0.6)';
      card.style.boxShadow = '0 0 12px rgba(59,130,246,0.15)';
      matched++;
    }
  });
  if (countEl) countEl.textContent = matched ? `${matched} linked item${matched !== 1 ? 's' : ''}` : 'No items linked yet';
}

(function initVideoFilter() {
  const params = new URLSearchParams(location.search);
  const videoParam = params.get('video');
  if (!videoParam) return;
  const banner = document.getElementById('video-filter-banner');
  const label = document.getElementById('video-filter-label');
  const countEl = document.getElementById('video-filter-count');
  banner.style.display = 'flex';
  label.textContent = `Showing items linked to video: ${videoParam}`;
  const origUpdate = window.updateAllRelationsUI;
  window.updateAllRelationsUI = function() {
    origUpdate && origUpdate();
    applyVideoFilter(videoParam, countEl);
  };
})();

// Init
loadSupabaseData();
loadList();
