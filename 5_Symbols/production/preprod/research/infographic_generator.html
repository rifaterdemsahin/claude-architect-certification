<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infographic Generator | Claude AI Certification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #030712;
      --bg-card: rgba(17, 24, 39, 0.9);
      --border-glow: rgba(139, 92, 246, 0.3);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #8b5cf6;
      --primary-glow: rgba(139, 92, 246, 0.6);
      --secondary: #3b82f6;
      --success: #10b981;
      --danger: #ef4444;
      --accent: #f59e0b;
      --font-title: 'Outfit', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.12) 0%, transparent 40%);
      color: var(--text-main);
      font-family: var(--font-body);
      line-height: 1.6;
      padding: 100px 24px 60px;
    }

    .container { max-width: 1000px; margin: 0 auto; }

    header { margin-bottom: 60px; text-align: center; }
    header h1 { font-family: var(--font-title); font-size: 3rem; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 10px; }
    header p { font-size: 1.2rem; color: var(--text-muted); }

    .glass-card {
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 40px;
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-muted); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-family: inherit;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--primary); outline: none; }

    .btn {
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Infographic Preview Styles */
    .info-preview {
      display: none;
      margin-top: 40px;
      background: linear-gradient(135deg, #111827, #1f2937);
      border-radius: 24px;
      padding: 60px 40px;
      color: white;
      box-shadow: 0 40px 100px rgba(0,0,0,0.8);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .info-header { text-align: center; margin-bottom: 60px; position: relative; z-index: 2; }
    .info-header h2 { font-family: var(--font-title); font-size: 2.8rem; font-weight: 900; margin-bottom: 10px; color: white; }
    .info-header p { font-size: 1.2rem; color: var(--text-muted); max-width: 600px; margin: 0 auto; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      position: relative;
      z-index: 2;
    }

    .info-section {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 30px;
      border-radius: 20px;
      transition: all 0.3s;
    }
    .info-section:hover { background: rgba(255, 255, 255, 0.05); transform: translateY(-5px); border-color: var(--primary); }

    .info-icon { font-size: 2.5rem; margin-bottom: 20px; display: block; }
    .info-section h3 { font-family: var(--font-title); font-size: 1.4rem; font-weight: 800; margin-bottom: 15px; color: var(--primary); }
    .info-section p { font-size: 0.95rem; color: var(--text-main); line-height: 1.6; }

    .loader {
      display: none; width: 24px; height: 24px; border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: 80px; text-align: center; padding-top: 40px; border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .nav-links { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
    .nav-links a { color: var(--text-muted); text-decoration: none; font-weight: 600; }
    .nav-links a:hover { color: var(--primary); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 Infographic Generator</h1>
      <p>Transform technical concepts into structured visual layouts</p>
    </header>

    <div class="glass-card">
      <form id="info-form">
        <div class="form-grid">
          <div class="form-group">
            <label>Module Number</label>
            <select id="module-number" required onchange="loadSentences()">
              <option value="1">Module 1</option>
              <option value="2">Module 2</option>
              <option value="3">Module 3</option>
              <option value="4">Module 4</option>
              <option value="5">Module 5</option>
            </select>
          </div>
          <div class="form-group">
            <label>Video Number</label>
            <select id="video-number" required onchange="loadSentences()">
              <option value="1">Video 1</option>
              <option value="2">Video 2</option>
              <option value="3">Video 3</option>
              <option value="4">Video 4</option>
              <option value="5">Video 5</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label style="display: flex; justify-content: space-between; align-items: center;">
            Relate to Script Sentence (Optional)
            <button type="button" class="btn btn-secondary" style="padding: 4px 12px; font-size: 0.75rem;" onclick="showFullScript()">📖 Read Full Script</button>
          </label>
          <select id="sentence-id">
            <option value="">-- No specific sentence --</option>
          </select>
        </div>

        <div class="form-group">
          <label>Topic or Content</label>
          <textarea id="topic" rows="4" required placeholder="e.g., The 7-stage Project Self-Learning System flow..."></textarea>
        </div>

        <div class="form-group">
          <label>Visual Style</label>
          <select id="style">
            <option value="modern">Modern Glassmorphism</option>
            <option value="minimalist">Minimalist Dark</option>
            <option value="technical">Technical Blueprint</option>
          </select>
        </div>

        <div style="text-align: right;">
          <button type="submit" id="gen-btn" class="btn btn-primary">
            <span id="btn-text">✨ Generate with Gemini</span>
            <div class="loader" id="btn-loader"></div>
          </button>
        </div>
      </form>
    </div>

    <div id="info-preview" class="info-preview">
      <div class="info-header">
        <h2 id="info-title"></h2>
        <p id="info-subtitle"></p>
      </div>
      <div id="info-grid" class="info-grid"></div>
      
      <div style="margin-top: 60px; text-align: center; display: flex; justify-content: center; gap: 20px;">
          <button id="save-btn" class="btn btn-success" onclick="saveInfographic()">💾 Save to Supabase</button>
          <button class="btn btn-primary" onclick="window.print()">🖨️ Export as PDF</button>
      </div>
      <p id="save-status" style="margin-top: 15px; color: var(--success); text-align: center; display: none;"></p>
    </div>

    <footer>
      <p style="font-weight: 800; font-size: 1.1rem; color: white; margin-bottom: 20px;">Claude AI Certification | Research Hub</p>
      <div class="nav-links">
        <a href="index.html">🗂 Research Hub</a>
        <a href="images.html">🖼 Images</a>
        <a href="notes.html">📝 Notes</a>
        <a href="../../../../index.html">🏠 Home</a>
      </div>
    </footer>
  </div>

  <div id="script-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(10px);">
    <div class="glass-card" style="width: 90%; max-width: 800px; max-height: 85vh; display: flex; flex-direction: column; padding: 0; overflow: hidden;">
        <div style="padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center;">
            <h2 id="modal-script-title" style="font-family: var(--font-title); margin: 0;">📜 Full Script View</h2>
            <button class="btn btn-danger" style="padding: 8px 16px;" onclick="closeScriptModal()">Close</button>
        </div>
        <div id="script-content" style="padding: 32px; overflow-y: auto; flex: 1; color: var(--text-main); font-size: 1.05rem; line-height: 1.8;">
            <!-- Script text will be injected here -->
        </div>
    </div>
  </div>

  <script src="../../../../shared/debug-panel.js"></script>
  <script src="../../../../shared/nav.js"></script>

  <script>
    let currentLayout = null;

    async function loadSentences() {
        const moduleNum = document.getElementById('module-number').value;
        const videoNum = document.getElementById('video-number').value;
        const select = document.getElementById('sentence-id');
        
        try {
            // We can fetch from Supabase via Go proxy or direct if config is available
            const configRes = await fetch('/api/config');
            const config = await configRes.json();
            
            const res = await fetch(`${config.supabaseUrl}/rest/v1/sentences?video_id=ilike.*local-${moduleNum}-${videoNum}*&order=sort_order.asc`, {
                headers: {
                    'apikey': config.supabaseAnon,
                    'Authorization': `Bearer ${config.supabaseAnon}`
                }
            });
            
            if (!res.ok) throw new Error('Failed to fetch sentences');
            const sentences = await res.json();
            window._currentSentences = sentences; // Store globally for the modal
            
            select.innerHTML = '<option value="">-- No specific sentence --</option>';
            sentences.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.innerText = `[${s.sentence_type}] ${s.sentence_text.substring(0, 50)}...`;
                select.appendChild(opt);
            });
        } catch (err) {
            console.error('Sentence load error:', err);
        }
    }

    function showFullScript() {
        const moduleNum = document.getElementById('module-number').value;
        const videoNum = document.getElementById('video-number').value;
        const modal = document.getElementById('script-modal');
        const content = document.getElementById('script-content');
        const title = document.getElementById('modal-script-title');

        title.innerText = `📜 Module ${moduleNum} Video ${videoNum} Script`;
        
        if (!window._currentSentences || window._currentSentences.length === 0) {
            content.innerHTML = '<p style="color: var(--danger); text-align: center;">No script data found for this selection.</p>';
        } else {
            content.innerHTML = window._currentSentences.map(s => `
                <div style="margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                    <span style="font-size: 0.7rem; text-transform: uppercase; color: var(--primary); font-weight: 800; display: block; margin-bottom: 4px;">${s.sentence_type}</span>
                    ${s.sentence_text}
                </div>
            `).join('');
        }

        modal.style.display = 'flex';
    }

    function closeScriptModal() {
        document.getElementById('script-modal').style.display = 'none';
    }

    document.getElementById('info-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const topic = document.getElementById('topic').value;
      const style = document.getElementById('style').value;
      
      const btn = document.getElementById('gen-btn');
      const btnText = document.getElementById('btn-text');
      const loader = document.getElementById('btn-loader');
      
      btn.disabled = true;
      btnText.style.display = 'none';
      loader.style.display = 'block';
      
      try {
        const res = await fetch('/api/infographics/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic, style })
        });
        
        if (!res.ok) throw new Error('Generation failed');
        
        const data = await res.json();
        currentLayout = data;
        renderInfographic(data);
        
        document.getElementById('info-preview').style.display = 'block';
        window.scrollTo({ top: document.getElementById('info-preview').offsetTop - 50, behavior: 'smooth' });
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        btn.disabled = false;
        btnText.style.display = 'block';
        loader.style.display = 'none';
      }
    });

    function renderInfographic(data) {
      document.getElementById('info-title').innerText = data.title;
      document.getElementById('info-subtitle').innerText = data.subtitle;
      
      const grid = document.getElementById('info-grid');
      grid.innerHTML = '';
      
      data.sections.forEach(s => {
        const div = document.createElement('div');
        div.className = 'info-section';
        div.innerHTML = `
          <span class="info-icon">${s.icon || '📍'}</span>
          <h3>${s.heading}</h3>
          <p>${s.content}</p>
        `;
        grid.appendChild(div);
      });
    }

    async function saveInfographic() {
        if (!currentLayout) return;
        
        const saveBtn = document.getElementById('save-btn');
        const status = document.getElementById('save-status');
        const sentId = document.getElementById('sentence-id').value;
        
        saveBtn.disabled = true;
        saveBtn.innerText = '⌛ Saving...';
        
        try {
            const res = await fetch('/api/infographics/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    module_number: parseInt(document.getElementById('module-number').value),
                    video_number: parseInt(document.getElementById('video-number').value),
                    sentence_id: sentId ? parseInt(sentId) : null,
                    topic: document.getElementById('topic').value,
                    style: document.getElementById('style').value,
                    layout_json: currentLayout
                })
            });
            
            if (!res.ok) throw new Error('Save failed');
            
            const result = await res.json();
            status.innerText = `✅ Infographic layout saved to Supabase & Azure (${result.blob_name})!`;
            status.style.display = 'block';
            saveBtn.innerText = '✅ Saved';
        } catch (err) {
            alert('Save Error: ' + err.message);
            saveBtn.disabled = false;
            saveBtn.innerText = '💾 Save to Supabase';
        }
    }

    loadSentences();
  </script>
</body>
</html>
