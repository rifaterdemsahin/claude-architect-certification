<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Script | Claude AI Certification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>

    :root {
      --bg-dark: #030712; --bg-card: rgba(17,24,39,0.85); --text-main: #f3f4f6; --text-muted: #9ca3af;
      --primary: #8b5cf6; --secondary: #3b82f6; --accent: #f59e0b;
      --font-title: 'Outfit', sans-serif; --font-body: 'Plus Jakarta Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at 10% 20%, rgba(139,92,246,0.08) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(59,130,246,0.08) 0%, transparent 40%);
      color: var(--text-main); font-family: var(--font-body); line-height: 1.6; padding-top: 70px; padding-bottom: 80px;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .badge { display: inline-block; padding: 6px 16px; background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(139,92,246,0.2)); border: 1px solid rgba(245,158,11,0.3); border-radius: 100px; font-size: 0.8rem; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; }
    h1 { font-family: var(--font-title); font-size: 2.4rem; font-weight: 800; margin-bottom: 10px; }
    header p { color: var(--text-muted); max-width: 600px; margin: 0 auto; }

    .module-nav { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 32px; }
    .module-btn { background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.2); color: #c084fc; padding: 10px 18px; border-radius: 10px; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
    .module-btn:hover { background: rgba(139,92,246,0.2); color: white; }
    .module-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    .module-card { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 28px; margin-bottom: 24px; display: none; }
    .module-card.active { display: block; }
    .module-card h2 { font-family: var(--font-title); font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .module-desc { color: var(--text-muted); margin-bottom: 24px; font-size: 0.95rem; }

    .video-list { display: grid; gap: 16px; margin-bottom: 24px; }
    .video-card { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 20px; }
    .video-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .video-title { font-weight: 700; font-size: 1.05rem; display: flex; align-items: center; gap: 10px; }
    .video-duration { background: rgba(139,92,246,0.15); padding: 3px 10px; border-radius: 6px; font-size: 0.8rem; color: #c084fc; }
    .video-script { color: var(--text-muted); font-size: 0.9rem; line-height: 1.7; margin-bottom: 12px; }
    .cue-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .cue-tag { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.15); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; color: #93c5fd; }

    .links-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06); }
    .links-section h3 { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
    .link-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .link-tag { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); padding: 6px 14px; border-radius: 8px; color: #93c5fd; text-decoration: none; font-size: 0.85rem; transition: all 0.2s; }
    .link-tag:hover { background: rgba(147,197,253,0.1); border-color: var(--secondary); color: white; }

    .exam-section { background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(59,130,246,0.1)); border: 1px solid rgba(139,92,246,0.2); border-radius: 20px; padding: 28px; margin-top: 32px; }
    .exam-section h3 { font-family: var(--font-title); font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; }
    .exam-section p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 14px; }
    .exam-scenarios { list-style: none; display: grid; gap: 8px; margin-bottom: 16px; }
    .exam-scenarios li { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: var(--text-main); }
    .exam-scenarios li::before { content: '📋'; }
    .exam-link { display: inline-flex; align-items: center; gap: 8px; background: var(--primary); color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 0.9rem; transition: all 0.3s; }
    .exam-link:hover { background: #7c3aed; transform: translateY(-2px); }

    .loading { text-align: center; padding: 80px; color: var(--text-muted); font-size: 1.2rem; }
    .error { text-align: center; padding: 80px; color: #ef4444; }

    /* Objectives & Key Results Box */
    .objectives-kr-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 28px;
    }
    @media (max-width: 768px) {
      .objectives-kr-container { grid-template-columns: 1fr; }
    }
    .obj-box, .kr-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .obj-box h4, .kr-box h4 {
      font-family: var(--font-title);
      font-size: 1.05rem;
      font-weight: 700;
      color: #c084fc;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .obj-box ul, .kr-box ul {
      list-style-type: none;
      padding-left: 0;
    }
    .obj-box li, .kr-box li {
      position: relative;
      padding-left: 20px;
      font-size: 0.9rem;
      color: var(--text-main);
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .obj-box li::before {
      content: '🎯';
      position: absolute;
      left: 0;
      top: 0;
      font-size: 0.85rem;
    }
    .kr-box li::before {
      content: '🔑';
      position: absolute;
      left: 0;
      top: 0;
      font-size: 0.85rem;
    }

    /* Script Editor Custom Classes */
    .video-script-container {
      margin-bottom: 16px;
    }
    .script-display {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 12px;
      white-space: pre-wrap;
    }
    .script-edit-form {
      margin-bottom: 12px;
    }
    .script-textarea {
      width: 100%;
      height: 120px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-main);
      font-family: var(--font-body);
      font-size: 0.9rem;
      line-height: 1.6;
      resize: vertical;
      margin-bottom: 10px;
    }
    .script-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.25);
    }
    .edit-actions {
      display: flex;
      gap: 10px;
    }
    .btn-save {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-save:hover {
      background: #7c3aed;
    }
    .btn-cancel {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .edit-trigger-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    .btn-edit {
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      color: #c084fc;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-edit:hover {
      background: rgba(139, 92, 246, 0.2);
      color: white;
    }
    .btn-template {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      color: #fbbf24;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-template:hover {
      background: rgba(245, 158, 11, 0.2);
      color: white;
    }
    /* Success / Save animation styling */
    @keyframes statusEntry {
      0% {
        opacity: 0;
        transform: translateY(6px) scale(0.95);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    @keyframes statusExit {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-4px) scale(0.95);
      }
    }
    @keyframes pulseSuccess {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      50% { transform: scale(1.04); box-shadow: 0 0 12px 4px rgba(16, 185, 129, 0.2); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
    @keyframes spinnerRotate {
      100% { transform: rotate(360deg); }
    }
    .save-status {
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      opacity: 0;
      transition: all 0.3s ease;
    }
    .save-status.saving {
      opacity: 1;
      color: #fbbf24;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.25);
      animation: statusEntry 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .save-status.success {
      opacity: 1;
      color: #34d399;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.25);
      animation: statusEntry 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, pulseSuccess 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) 0.3s;
    }
    .save-status.error-status {
      opacity: 1;
      color: #f87171;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      animation: statusEntry 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .save-status.exit {
      animation: statusExit 0.25s ease-in forwards;
    }
    .status-spinner {
      animation: spinnerRotate 1s linear infinite;
    }

    footer { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }

    .module-title-link { color: inherit; text-decoration: none; transition: color 0.2s; }
    .module-title-link:hover { color: #c084fc; }
    .module-title-arrow { font-size: 0.7rem; color: var(--text-muted); margin-left: 8px; text-decoration: none; opacity: 0.6; vertical-align: middle; transition: opacity 0.2s; }
    .module-title-arrow:hover { opacity: 1; color: #c084fc; }
    .scene-title-link { color: inherit; text-decoration: none; transition: color 0.2s; }
    .scene-title-link:hover { color: #93c5fd; }

    .video-action-bar { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 12px; }
    .action-chip { display: inline-flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); width: 32px; height: 32px; border-radius: 8px; text-decoration: none; font-size: 1rem; line-height: 1; transition: all 0.2s; }
    .action-chip:hover { transform: translateY(-2px); }
    .action-chip.shotlist:hover { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.4); }
    .action-chip.outline:hover { background: rgba(139,92,246,0.15); border-color: rgba(139,92,246,0.4); }

    /* Audio generation */
    .audio-action-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 8px 0 10px; }
    .btn-gen-audio { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: #fbbf24; padding: 6px 14px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-body); }
    .btn-gen-audio:hover:not(:disabled) { background: rgba(245,158,11,0.2); color: #fde68a; }
    .btn-gen-audio:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-listen { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #34d399; padding: 6px 14px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; text-decoration: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-listen:hover { background: rgba(16,185,129,0.2); color: #6ee7b7; }
    .audio-status { font-size: 0.78rem; font-weight: 600; padding: 4px 10px; border-radius: 6px; transition: all 0.25s; }
    .audio-status.generating { color: #fbbf24; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); }
    .audio-status.uploading { color: #93c5fd; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); }
    .audio-status.success { color: #34d399; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); }
    .audio-status.warn { color: #fbbf24; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); }
    .audio-status.error-audio { color: #f87171; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); }
    .audio-player-container { margin: 0 0 10px; }
    .audio-player-container audio { width: 100%; border-radius: 8px; }

    /* Google Drive config panel */
    .gdrive-config { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
    .gdrive-toggle { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); padding: 6px 14px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-body); }
    .gdrive-toggle:hover { background: rgba(255,255,255,0.08); color: var(--text-main); }
    .gdrive-toggle.configured { border-color: rgba(16,185,129,0.3); color: #34d399; background: rgba(16,185,129,0.06); }
    .gdrive-form { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 16px; width: 100%; max-width: 620px; }
    .gdrive-input { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 7px 12px; color: var(--text-main); font-size: 0.82rem; flex: 1; min-width: 200px; font-family: var(--font-body); }
    .gdrive-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 8px rgba(139,92,246,0.2); }
    .btn-gdrive-save { background: var(--primary); color: white; border: none; padding: 7px 16px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: var(--font-body); white-space: nowrap; }
    .btn-gdrive-save:hover { background: #7c3aed; }
    .btn-gdrive-clear { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #f87171; padding: 7px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: var(--font-body); white-space: nowrap; }
    .btn-gdrive-clear:hover { background: rgba(239,68,68,0.2); }
    .gdrive-msg { font-size: 0.78rem; font-weight: 600; min-width: 60px; }
    .gdrive-msg.ok { color: #34d399; }
    .gdrive-msg.cleared { color: #9ca3af; }
  </style>
  <script src="../../../../shared/nav.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

  <div class="container">
    <header>
      <div class="badge">Pre-Production</div>
      <a href="../../../../course_outline.html" style="display:inline-flex;align-items:center;gap:0.4rem;color:#8b5cf6;font-size:0.82rem;font-weight:600;text-decoration:none;margin-bottom:0.75rem;opacity:0.85;transition:opacity 0.2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.85'">
        <span style="font-size:1rem">←</span> Course Outline

    <footer>
      <p><a href="../../preprod/index.html" style="color: var(--secondary); text-decoration: none;">← Back to Pre-Production</a></p>

  <script>
    const FALLBACK_OUTLINES = {
      1: {
        objectives: ["Understand Claude API anatomy, token mechanics, and production orchestration patterns."],
        keyResults: [
          "Deploy a multi-agent routing topology with security guards.",
          "Configure environment variables, VPC, and IAM for production."
        ]
      },
      2: {
        objectives: ["Build and deploy MCP servers for secure private data bridges."],
        keyResults: [
          "Deploy an MCP server on Fly.io with SQLite/PostgreSQL bridge.",
          "Implement read-only query boundaries with stdio/SSE transports."
        ]
      },
      3: {
        objectives: ["Implement zero-data retention compliance using AWS Bedrock PrivateLink."],
        keyResults: [
          "Configure VPC Interface Endpoints with Terraform.",
          "Produce audit logs and pass compliance review."
        ]
      },
      4: {
        objectives: ["Build deterministic agent routers with circuit-breaker safeguards."],
        keyResults: [
          "Implement router.py with loop detection and depth counting.",
          "Test circuit breaker against malformed input and recursion attacks."
        ]
      },
      5: {
        objectives: ["Reduce enterprise operational costs by 90% using prompt caching."],
        keyResults: [
          "Implement prefix-matching cache points achieving 90% hit rate.",
          "Deploy cache_layer.py with LRU and TTL strategies."
        ]
      }
    };

    const INTRO_TEMPLATE = `Format: Talking Head | Duration: [DURATION]

🔥 HOOK (on camera, high energy):
"[BOLD CLAIM or CHALLENGE — something that stops the viewer cold]"

If you've ever [PAIN POINT they know too well], this module changes everything.

By the end of this [DURATION] you will be able to:
✅ [SKILL 1 — concrete, measurable]
✅ [SKILL 2 — concrete, measurable]
✅ [SKILL 3 — concrete, measurable]

This is the knowledge that separates engineers who build toys from engineers who build [HIGH-STAKES OUTCOME].

Here's what we're going to cover:
- [TOPIC 1] — because [WHY IT MATTERS]
- [TOPIC 2] — because [WHY IT MATTERS]
- [TOPIC 3] — because [WHY IT MATTERS]

Let's get into it. First up: [FIRST TOPIC].`;

    const OUTRO_TEMPLATE = `Format: Talking Head | Duration: [DURATION]

RECAP (calm, confident):
You now know how to [SKILL 1], [SKILL 2], and [SKILL 3].

That's not trivial. Most teams [COMMON MISTAKE they used to make] — you won't.

But here's what I haven't told you yet.

[TEASER — one sentence that hints at a bigger problem or mystery]:
"[CLIFFHANGER STATEMENT — something that raises a question they now desperately want answered]"

In the next module, we go deeper: [NEXT MODULE TOPIC].
And the approach? It's nothing like what you'd expect.

[Call to action]:
If this clicked for you — share it with [TARGET AUDIENCE]. They'll thank you.

See you in Module [NEXT MODULE NUMBER].`;

    const BODY_TEMPLATE = `Format: Talking Head + Screen Share | Duration: [DURATION]

"[HOOK SENTENCE — one punchy line that frames the core problem]" That's the topic we're unpacking today.

Overview & Objectives:
- [OBJECTIVE 1]
- [OBJECTIVE 2]
- [OBJECTIVE 3]

Let's start with [FIRST TOPIC] — from [STARTING POINT] through [END POINT].

[Screenshare Starts]
Diagram: [DIAGRAM TITLE]
- Step 1: [STEP 1]
- Step 2: [STEP 2]
- Step 3: [STEP 3]
- Step 4: [STEP 4]
Key insight: [KEY INSIGHT — one sentence distilling the diagram]
[Screenshare Ends]

Here's the key takeaway: [MAIN TAKEAWAY — the single most important idea]

Now, before we move to [NEXT SECTION], let's check your understanding.`;

    window.loadTemplate = function(elementId, videoPos, totalVideos) {
      const textArea = document.getElementById(`script-textarea-${elementId}`);
      if (videoPos === 1) {

    // ── Cookie helpers ─────────────────────────────────────────────────────────
    function getCookie(name) {
      const m = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^;]*)'));
      return m ? decodeURIComponent(m[1]) : null;
    }
    function setCookie(name, val, days) {
      document.cookie = `${name}=${encodeURIComponent(val)};max-age=${days * 86400};path=/;SameSite=Lax`;
    }

    // GOOGLE_CLIENT_ID — read from localStorage first, cookie as fallback

    // ── Google Identity Services (GIS) token flow ──────────────────────────────
    let _gisClient = null;
    let _gisToken = null;

    function initGisClient() {
      if (!GOOGLE_CLIENT_ID || !window.google?.accounts?.oauth2) return;
      _gisClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive.file',
        callback: () => {}
      });
    }

    async function getGisToken() {
      if (!_gisClient) initGisClient();
      if (!_gisClient) throw new Error('Google auth not ready — set google_client_id in localStorage');
      return new Promise((resolve, reject) => {
        _gisClient.callback = (resp) => {
          if (resp.error) reject(new Error(resp.error));
          else { _gisToken = resp.access_token; resolve(resp.access_token); }
        };
        _gisClient.requestAccessToken({ prompt: _gisToken ? '' : 'consent' });
      });
    }

    // ── Google Drive helpers ────────────────────────────────────────────────────
    async function findOrCreateDriveFolder(token, name) {
      const q = encodeURIComponent(`name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
      const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      if (data.files && data.files.length > 0) return data.files[0].id;
      const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder' })
      });
      const folder = await createRes.json();
      return folder.id;
    }

    async function uploadToDrive(token, mp3Blob, filename) {
      const folderId = await findOrCreateDriveFolder(token, 'Claude Architect Audio');
      const metadata = JSON.stringify({ name: filename, parents: [folderId], mimeType: 'audio/mpeg' });
      const form = new FormData();
      form.append('metadata', new Blob([metadata], { type: 'application/json' }));
      form.append('file', mp3Blob, filename);
      const uploadRes = await fetch(
        'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
        { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: form }
      );
      const file = await uploadRes.json();
      if (!file.id) throw new Error('Drive upload returned no file id');
      await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}/permissions`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ role: 'reader', type: 'anyone' })
      });
      return `https://drive.google.com/file/d/${file.id}/view`;
    }

    // ── Supabase audio_url persistence ─────────────────────────────────────────
    async function saveAudioUrl(videoId, audioUrl) {
      if (!SUPABASE_URL.includes('supabase.co') || !videoId || !SUPABASE_ANON_KEY) return false;
      const authHeaders = {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      };
      const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/scripts?video_id=eq.${videoId}`, {
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
      });
      const existing = await checkRes.json();
      const hasRecord = existing && existing.length > 0;
      const url = hasRecord
        ? `${SUPABASE_URL}/rest/v1/scripts?video_id=eq.${videoId}`
        : `${SUPABASE_URL}/rest/v1/scripts`;
      const body = hasRecord
        ? { audio_url: audioUrl, audio_generated_at: new Date().toISOString(), updated_at: new Date().toISOString() }
        : { video_id: parseInt(videoId), script_text: '', audio_url: audioUrl, audio_generated_at: new Date().toISOString(), updated_at: new Date().toISOString() };
      const res = await fetch(url, { method: hasRecord ? 'PATCH' : 'POST', headers: authHeaders, body: JSON.stringify(body) });
      return res.ok;
    }

    window.generateAudio = async function(videoId, moduleIdx, videoIdx) {
      const elementId = videoId || `local-${moduleIdx}-${videoIdx}`;
      const vTarget = window.loadedData && window.loadedData.modules[moduleIdx]
        ? window.loadedData.modules[moduleIdx].videos.find(v => v.id === videoIdx)
        : null;
      const scriptText = vTarget ? vTarget.script : '';
      if (!scriptText.trim()) {
        alert('No script text found for this video.');
        return;
      }

      const statusEl = document.getElementById(`audio-status-${elementId}`);
      const btnEl = document.getElementById(`btn-audio-${elementId}`);
      const playerEl = document.getElementById(`audio-player-${elementId}`);
      const listenEl = document.getElementById(`listen-link-${elementId}`);

      btnEl.disabled = true;
      setAudioStatus(statusEl, 'generating', '🎙 Generating audio…');

      try {
        // 1. Call Kokoro TTS
        const ttsRes = await fetch(`${KOKORO_BASE}/api/speak`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: scriptText.slice(0, 5000), voice: 'af_heart', speed: 1.0 })
        });
        if (!ttsRes.ok) throw new Error(`TTS error ${ttsRes.status}: ${await ttsRes.text()}`);
        const mp3Blob = await ttsRes.blob();

        // 2. Play inline immediately
        const blobUrl = URL.createObjectURL(mp3Blob);
        playerEl.innerHTML = `<audio controls src="${blobUrl}"></audio>`;

        // 3. Upload to Google Drive (requires google_client_id in localStorage)
        if (GOOGLE_CLIENT_ID) {
          setAudioStatus(statusEl, 'uploading', '☁️ Uploading to Drive…');
          try {
            const token = await getGisToken();
            const filename = `module${moduleIdx + 1}-video${videoIdx}-script.mp3`;
            const driveLink = await uploadToDrive(token, mp3Blob, filename);

            // 4. Save to Supabase
            await saveAudioUrl(videoId, driveLink);

            // 5. Update listen button
            if (listenEl) {
              listenEl.href = driveLink;
              listenEl.style.display = 'inline-flex';
            }
            if (vTarget) vTarget.audioUrl = driveLink;

            setAudioStatus(statusEl, 'success', '✅ Saved to Drive');
          } catch (driveErr) {
            console.warn('Drive upload failed:', driveErr);
            setAudioStatus(statusEl, 'warn', '⚠️ Playing locally — Drive upload failed');
          }
        } else {
          setAudioStatus(statusEl, 'warn', '⚠️ Playing locally — set google_client_id to save');
        }
      } catch (err) {
        console.error('Audio generation failed:', err);
        setAudioStatus(statusEl, 'error-audio', `❌ ${err.message}`);
      } finally {
        btnEl.disabled = false;
        setTimeout(() => setAudioStatus(statusEl, '', ''), 6000);
      }
    };

    async function loadFromSupabase() {
      if (!SUPABASE_URL.includes('supabase.co')) return null;
      try {
        async function sq(endpoint) {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
          });
          if (!res.ok) return null;
          return res.json();
        }
        const modules = await sq('modules?order=module_number.asc');
        const videos = await sq('videos?order=video_number.asc&select=*,video_cues(*)');
        const links = await sq('resource_links?select=*,module_id(*)');
        const outlines = await sq('outline?order=sort_order.asc');
        const scripts = await sq('scripts?select=video_id,script_text,audio_url');

        if (!modules) return null;

        return {
          course: { title: 'Claude AI Certification for Architects', pipeline: 'Supabase' },
          modules: modules.map(m => ({
            id: m.module_number, title: m.title, description: m.description,
            objectives: (outlines || []).filter(o => o.module_number === m.module_number && o.content_type === 'objective').map(o => o.content),
            keyResults: (outlines || []).filter(o => o.module_number === m.module_number && o.content_type === 'key_result').map(o => o.content),
            videos: (videos || []).filter(v => v.module_id === m.id).map(v => {
              const matchedScript = (scripts || []).find(s => s.video_id === v.id);
              return {
                id: v.video_number,
                videoId: v.id,
                title: v.title,
                duration: v.duration,
                script: matchedScript ? matchedScript.script_text : v.script,
                audioUrl: matchedScript ? (matchedScript.audio_url || null) : null,
                cues: (v.video_cues || []).sort((a,b) => a.sort_order - b.sort_order).map(c => c.cue_text)
              };
            }),
            links: (links || []).filter(l => l.module_id === m.id).map(l => ({ label: l.label, url: l.url }))
          })),
          exam: { title: 'Certification Exam & Case Study', description: 'The final exam covers all 5 modules.', scenarios: [], link: 'docs/certification/exam_and_case_study.md' }
        };
      } catch (err) {
        console.error('Failed to load from Supabase:', err);
        return null;
      }
    }

    (async () => {
      let data = await loadFromSupabase();
      if (!data) {
        data = await fetch('master_script.json').then(r => r.json()).catch(() => null);
        if (data) {
          data.modules.forEach(m => {
            const fallback = FALLBACK_OUTLINES[m.id] || { objectives: [], keyResults: [] };
            m.objectives = fallback.objectives;
            m.keyResults = fallback.keyResults;
          });
        }
      }
      
      if (data) {
        // Hydrate overrides
        data.modules.forEach(m => {
          m.videos.forEach(v => {
            const override = localStorage.getItem(`script_override_${m.id}_${v.id}`);
            if (override) {
              v.script = override;
            }
          });
        });
        window.loadedData = data;
        render(data);
        updateGoogleConfigUI();
      } else {
        document.getElementById('content-area').innerHTML =
          '<div class="error"><h2>❌ Failed to Load</h2><p>Could not load from Supabase or local JSON.</p></div>';
      }
    })();
  </script>
</body>
</html>
