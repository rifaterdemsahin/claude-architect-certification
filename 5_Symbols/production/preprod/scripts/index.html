<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Script | Claude AI Certification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>

    :root {
      --bg-dark: #030712; --bg-card: rgba(17,24,39,0.85); --text-main: #f3f4f6; --text-muted: #9ca3af;
      --primary: #8b5cf6; --secondary: #3b82f6; --accent: #f59e0b;
      --font-title: 'Outfit', sans-serif; --font-body: 'Plus Jakarta Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at 10% 20%, rgba(139,92,246,0.08) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(59,130,246,0.08) 0%, transparent 40%);
      color: var(--text-main); font-family: var(--font-body); line-height: 1.6; padding-top: 70px; padding-bottom: 80px;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .badge { display: inline-block; padding: 6px 16px; background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(139,92,246,0.2)); border: 1px solid rgba(245,158,11,0.3); border-radius: 100px; font-size: 0.8rem; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; }
    h1 { font-family: var(--font-title); font-size: 2.4rem; font-weight: 800; margin-bottom: 10px; }
    header p { color: var(--text-muted); max-width: 600px; margin: 0 auto; }

    .module-nav { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 32px; }
    .module-btn { background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.2); color: #c084fc; padding: 10px 18px; border-radius: 10px; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
    .module-btn:hover { background: rgba(139,92,246,0.2); color: white; }
    .module-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    .module-card { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 28px; margin-bottom: 24px; display: none; }
    .module-card.active { display: block; }
    .module-card h2 { font-family: var(--font-title); font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .module-desc { color: var(--text-muted); margin-bottom: 24px; font-size: 0.95rem; }

    .video-list { display: grid; gap: 16px; margin-bottom: 24px; }
    .video-card { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 20px; }
    .video-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .video-title { font-weight: 700; font-size: 1.05rem; display: flex; align-items: center; gap: 10px; }
    .video-duration { background: rgba(139,92,246,0.15); padding: 3px 10px; border-radius: 6px; font-size: 0.8rem; color: #c084fc; }
    .video-script { color: var(--text-muted); font-size: 0.9rem; line-height: 1.7; margin-bottom: 12px; }
    .cue-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .cue-tag { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.15); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; color: #93c5fd; }

    .links-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06); }
    .links-section h3 { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
    .link-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .link-tag { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); padding: 6px 14px; border-radius: 8px; color: #93c5fd; text-decoration: none; font-size: 0.85rem; transition: all 0.2s; }
    .link-tag:hover { background: rgba(147,197,253,0.1); border-color: var(--secondary); color: white; }

    .exam-section { background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(59,130,246,0.1)); border: 1px solid rgba(139,92,246,0.2); border-radius: 20px; padding: 28px; margin-top: 32px; }
    .exam-section h3 { font-family: var(--font-title); font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; }
    .exam-section p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 14px; }
    .exam-scenarios { list-style: none; display: grid; gap: 8px; margin-bottom: 16px; }
    .exam-scenarios li { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: var(--text-main); }
    .exam-scenarios li::before { content: '📋'; }
    .exam-link { display: inline-flex; align-items: center; gap: 8px; background: var(--primary); color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 0.9rem; transition: all 0.3s; }
    .exam-link:hover { background: #7c3aed; transform: translateY(-2px); }

    .loading { text-align: center; padding: 80px; color: var(--text-muted); font-size: 1.2rem; }
    .error { text-align: center; padding: 80px; color: #ef4444; }

    /* Objectives & Key Results Box */
    .objectives-kr-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 28px;
    }
    @media (max-width: 768px) {
      .objectives-kr-container { grid-template-columns: 1fr; }
    }
    .obj-box, .kr-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .obj-box h4, .kr-box h4 {
      font-family: var(--font-title);
      font-size: 1.05rem;
      font-weight: 700;
      color: #c084fc;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .obj-box ul, .kr-box ul {
      list-style-type: none;
      padding-left: 0;
    }
    .obj-box li, .kr-box li {
      position: relative;
      padding-left: 20px;
      font-size: 0.9rem;
      color: var(--text-main);
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .obj-box li::before {
      content: '🎯';
      position: absolute;
      left: 0;
      top: 0;
      font-size: 0.85rem;
    }
    .kr-box li::before {
      content: '🔑';
      position: absolute;
      left: 0;
      top: 0;
      font-size: 0.85rem;
    }

    /* Script Editor Custom Classes */
    .video-script-container {
      margin-bottom: 16px;
    }
    .script-display {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 12px;
      white-space: pre-wrap;
    }
    .script-edit-form {
      margin-bottom: 12px;
    }
    .script-textarea {
      width: 100%;
      height: 120px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-main);
      font-family: var(--font-body);
      font-size: 0.9rem;
      line-height: 1.6;
      resize: vertical;
      margin-bottom: 10px;
    }
    .script-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.25);
    }
    .edit-actions {
      display: flex;
      gap: 10px;
    }
    .btn-save {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-save:hover {
      background: #7c3aed;
    }
    .btn-cancel {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .edit-trigger-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    .btn-edit {
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      color: #c084fc;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-edit:hover {
      background: rgba(139, 92, 246, 0.2);
      color: white;
    }
    .btn-template {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      color: #fbbf24;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-template:hover {
      background: rgba(245, 158, 11, 0.2);
      color: white;
    }
    /* Success / Save animation styling */
    @keyframes statusEntry {
      0% {
        opacity: 0;
        transform: translateY(6px) scale(0.95);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    @keyframes statusExit {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-4px) scale(0.95);
      }
    }
    @keyframes pulseSuccess {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      50% { transform: scale(1.04); box-shadow: 0 0 12px 4px rgba(16, 185, 129, 0.2); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
    @keyframes spinnerRotate {
      100% { transform: rotate(360deg); }
    }
    .save-status {
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      opacity: 0;
      transition: all 0.3s ease;
    }
    .save-status.saving {
      opacity: 1;
      color: #fbbf24;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.25);
      animation: statusEntry 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .save-status.success {
      opacity: 1;
      color: #34d399;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.25);
      animation: statusEntry 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, pulseSuccess 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) 0.3s;
    }
    .save-status.error-status {
      opacity: 1;
      color: #f87171;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      animation: statusEntry 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .save-status.exit {
      animation: statusExit 0.25s ease-in forwards;
    }
    .status-spinner {
      animation: spinnerRotate 1s linear infinite;
    }

    footer { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }

    .module-title-link { color: inherit; text-decoration: none; transition: color 0.2s; }
    .module-title-link:hover { color: #c084fc; }
    .module-title-arrow { font-size: 0.7rem; color: var(--text-muted); margin-left: 8px; text-decoration: none; opacity: 0.6; vertical-align: middle; transition: opacity 0.2s; }
    .module-title-arrow:hover { opacity: 1; color: #c084fc; }
    .scene-title-link { color: inherit; text-decoration: none; transition: color 0.2s; }
    .scene-title-link:hover { color: #93c5fd; }

    .video-action-bar { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 12px; }
    .action-chip { display: inline-flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); width: 32px; height: 32px; border-radius: 8px; text-decoration: none; font-size: 1rem; line-height: 1; transition: all 0.2s; }
    .action-chip:hover { transform: translateY(-2px); }
    .action-chip.shotlist:hover { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.4); }
    .action-chip.outline:hover { background: rgba(139,92,246,0.15); border-color: rgba(139,92,246,0.4); }
  </style>
  <script src="../../../../shared/nav.js"></script>
</head>
<body>

  <div class="container">
    <header>
      <div class="badge">Pre-Production</div>
      <a href="../../../../course_outline.html" style="display:inline-flex;align-items:center;gap:0.4rem;color:#8b5cf6;font-size:0.82rem;font-weight:600;text-decoration:none;margin-bottom:0.75rem;opacity:0.85;transition:opacity 0.2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.85'">
        <span style="font-size:1rem">←</span> Course Outline
      </a>
      <h1>Master Script</h1>
      <p>Course-wide script outline with video breakdowns, timing cues, and production notes for all 5 modules.</p>
    </header>

    <div id="module-nav" class="module-nav"></div>
    <div id="content-area">
      <div class="loading">Loading master script data...</div>
    </div>

    <footer>
      <p><a href="../../preprod/index.html" style="color: var(--secondary); text-decoration: none;">← Back to Pre-Production</a></p>
    </footer>
  </div>

  <script>
    const FALLBACK_OUTLINES = {
      1: {
        objectives: ["Understand Claude API anatomy, token mechanics, and production orchestration patterns."],
        keyResults: [
          "Deploy a multi-agent routing topology with security guards.",
          "Configure environment variables, VPC, and IAM for production."
        ]
      },
      2: {
        objectives: ["Build and deploy MCP servers for secure private data bridges."],
        keyResults: [
          "Deploy an MCP server on Fly.io with SQLite/PostgreSQL bridge.",
          "Implement read-only query boundaries with stdio/SSE transports."
        ]
      },
      3: {
        objectives: ["Implement zero-data retention compliance using AWS Bedrock PrivateLink."],
        keyResults: [
          "Configure VPC Interface Endpoints with Terraform.",
          "Produce audit logs and pass compliance review."
        ]
      },
      4: {
        objectives: ["Build deterministic agent routers with circuit-breaker safeguards."],
        keyResults: [
          "Implement router.py with loop detection and depth counting.",
          "Test circuit breaker against malformed input and recursion attacks."
        ]
      },
      5: {
        objectives: ["Reduce enterprise operational costs by 90% using prompt caching."],
        keyResults: [
          "Implement prefix-matching cache points achieving 90% hit rate.",
          "Deploy cache_layer.py with LRU and TTL strategies."
        ]
      }
    };

    const SCRIPT_TEMPLATE = `Format: Talking Head + Screen Share | Duration: [DURATION]

"[HOOK SENTENCE — one punchy line that frames the core problem]" That's the topic we're unpacking today.

Overview & Objectives:
- [OBJECTIVE 1]
- [OBJECTIVE 2]
- [OBJECTIVE 3]

Let's start with [FIRST TOPIC] — from [STARTING POINT] through [END POINT].

[Screenshare Starts]
Diagram: [DIAGRAM TITLE]
- Step 1: [STEP 1]
- Step 2: [STEP 2]
- Step 3: [STEP 3]
- Step 4: [STEP 4]
Key insight: [KEY INSIGHT — one sentence distilling the diagram]
[Screenshare Ends]

Here's the key takeaway: [MAIN TAKEAWAY — the single most important idea]

Now, before we move to [NEXT SECTION], let's check your understanding.`;

    window.loadTemplate = function(elementId) {
      const textArea = document.getElementById(`script-textarea-${elementId}`);
      textArea.value = SCRIPT_TEMPLATE;
      // Open edit mode if not already open
      const form = document.getElementById(`script-edit-form-${elementId}`);
      if (form.style.display === 'none' || !form.style.display) {
        toggleEdit(elementId, true);
      }
    };

    window.toggleEdit = function(elementId, show) {
      const display = document.getElementById(`script-display-${elementId}`);
      const form = document.getElementById(`script-edit-form-${elementId}`);
      const editBtn = document.getElementById(`btn-edit-${elementId}`);
      
      if (show) {
        display.style.display = 'none';
        form.style.display = 'block';
        editBtn.style.display = 'none';
      } else {
        display.style.display = 'block';
        form.style.display = 'none';
        editBtn.style.display = 'block';
      }
    };

    window.saveScript = async function(videoId, moduleIdx, videoIdx) {
      const elementId = videoId || `local-${moduleIdx}-${videoIdx}`;
      const textArea = document.getElementById(`script-textarea-${elementId}`);
      const statusSpan = document.getElementById(`save-status-${elementId}`);
      const newScript = textArea.value.trim();

      statusSpan.className = 'save-status saving';
      statusSpan.innerHTML = `
        <svg class="status-spinner" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" style="display:inline-block; vertical-align:middle;">
          <circle cx="12" cy="12" r="10" stroke="rgba(251, 191, 36, 0.2)"></circle>
          <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor"></path>
        </svg>
        <span>Saving...</span>
      `;

      try {
        let savedSuccessfully = false;
        const isSupabaseConfigured = SUPABASE_URL.includes('supabase.co') && SUPABASE_ANON_KEY;

        if (isSupabaseConfigured && videoId) {
          // Check if record exists
          const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/scripts?video_id=eq.${videoId}`, {
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            }
          });
          const existing = await checkRes.json();
          
          let method = 'POST';
          let url = `${SUPABASE_URL}/rest/v1/scripts`;
          let headers = {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
          };

          if (existing && existing.length > 0) {
            method = 'PATCH';
            url = `${SUPABASE_URL}/rest/v1/scripts?video_id=eq.${videoId}`;
          }

          const body = {
            video_id: parseInt(videoId),
            script_text: newScript,
            updated_at: new Date().toISOString()
          };

          const saveRes = await fetch(url, {
            method,
            headers,
            body: JSON.stringify(body)
          });

          if (saveRes.ok) {
            savedSuccessfully = true;
          }
        }

        // Cache update locally
        localStorage.setItem(`script_override_${moduleIdx + 1}_${videoIdx}`, newScript);
        
        // Update loaded data memory
        const vTarget = window.loadedData.modules[moduleIdx].videos.find(v => v.id === videoIdx);
        if (vTarget) vTarget.script = newScript;

        document.getElementById(`script-display-${elementId}`).textContent = newScript;
        toggleEdit(elementId, false);

        statusSpan.className = 'save-status success';
        statusSpan.innerHTML = `
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block; vertical-align:middle;">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          <span>${savedSuccessfully ? 'Saved to Supabase' : 'Saved locally'}</span>
        `;
        
        setTimeout(() => {
          statusSpan.classList.add('exit');
          setTimeout(() => {
            statusSpan.className = 'save-status';
            statusSpan.innerHTML = '';
          }, 300);
        }, 3000);

      } catch (err) {
        console.error(err);
        statusSpan.className = 'save-status error-status';
        statusSpan.innerHTML = `
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block; vertical-align:middle;">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="15" y1="9" x2="9" y2="15"></line>
            <line x1="9" y1="9" x2="15" y2="15"></line>
          </svg>
          <span>Save error</span>
        `;
        setTimeout(() => {
          statusSpan.classList.add('exit');
          setTimeout(() => {
            statusSpan.className = 'save-status';
            statusSpan.innerHTML = '';
          }, 300);
        }, 3000);
      }
    };

    function getModuleUrl(id) {
      if (id === 1) return '../../postprod/module-1/section-1/post_production_master.html';
      return `../../postprod/module-${id}/section-1/demo_script_show.html`;
    }

    function getSceneUrl(id) {
      if (id === 1) return '../../postprod/module-1/section-1/demo_script.html';
      return `../../postprod/module-${id}/section-1/demo_script_show.html`;
    }

    function getShotlistUrl(moduleId) {
      return `../../postprod/module-1/section-1/production_shotlist.html?module=${moduleId}&section=1`;
    }

    function getOutlineUrl(moduleId, videoId) {
      return `../../../../course_outline.html?module=${moduleId}&video=${videoId}`;
    }

    function render(data) {
      const nav = document.getElementById('module-nav');
      const area = document.getElementById('content-area');
      let html = '';

      nav.innerHTML = data.modules.map((m, i) =>
        `<button class="module-btn${i === 0 ? ' active' : ''}" onclick="showModule(${i})">M${m.id}: ${m.title}</button>`
      ).join('');

      data.modules.forEach((m, mi) => {
        html += `<div class="module-card${mi === 0 ? ' active' : ''}" id="mod-${mi}">`;
        html += `<h2><a class="module-title-link" href="${getModuleUrl(m.id)}">Module ${m.id}: ${m.title}</a><a class="module-title-arrow" href="${getModuleUrl(m.id)}">↗</a></h2>`;
        html += `<div class="module-desc">${m.description}</div>`;

        // Render Objectives & Key Results
        const objectives = m.objectives || [];
        const keyResults = m.keyResults || [];
        if (objectives.length || keyResults.length) {
          html += `<div class="objectives-kr-container">`;
          
          if (objectives.length) {
            html += `<div class="obj-box">`;
            html += `<h4>🎯 Module Objectives</h4>`;
            html += `<ul>${objectives.map(o => `<li>${o}</li>`).join('')}</ul>`;
            html += `</div>`;
          }
          
          if (keyResults.length) {
            html += `<div class="kr-box">`;
            html += `<h4>🔑 Key Results</h4>`;
            html += `<ul>${keyResults.map(k => `<li>${k}</li>`).join('')}</ul>`;
            html += `</div>`;
          }
          
          html += `</div>`;
        }

        html += `<div class="video-list">`;
        m.videos.forEach(v => {
          const elementId = v.videoId || `local-${mi}-${v.id}`;
          html += `<div class="video-card">`;
          html += `<div class="video-header"><span class="video-title">🎬 <a class="scene-title-link" href="${getSceneUrl(m.id)}">Video ${v.id}: ${v.title}</a></span><span class="video-duration">${v.duration}</span></div>`;
          html += `<div class="video-action-bar">`;
          html += `<a class="action-chip shotlist" href="${getShotlistUrl(m.id)}" title="Shot List — Module ${m.id}, Video ${v.id}">🎬</a>`;
          html += `<a class="action-chip outline" href="${getOutlineUrl(m.id, v.id)}" title="Jump to Module ${m.id} in Course Outline">🗺</a>`;
          html += `</div>`;
          
          // Editable Script Block
          html += `<div class="video-script-container" id="script-container-${elementId}">`;
          html += `<div class="script-display" id="script-display-${elementId}">${v.script}</div>`;
          html += `<div class="script-edit-form" id="script-edit-form-${elementId}" style="display: none;">`;
          html += `<textarea class="script-textarea" id="script-textarea-${elementId}">${v.script}</textarea>`;
          html += `<div class="edit-actions">`;
          html += `<button class="btn-save" onclick="saveScript('${v.videoId || ''}', ${mi}, ${v.id})">Save Changes</button>`;
          html += `<button class="btn-cancel" onclick="toggleEdit('${elementId}', false)">Cancel</button>`;
          html += `</div>`;
          html += `</div>`;
          html += `<div class="edit-trigger-row">`;
          html += `<button class="btn-edit" id="btn-edit-${elementId}" onclick="toggleEdit('${elementId}', true)">✏️ Edit Script</button>`;
          html += `<button class="btn-template" onclick="loadTemplate('${elementId}')">📋 Template</button>`;
          html += `<span class="save-status" id="save-status-${elementId}"></span>`;
          html += `</div>`;
          html += `</div>`; // end script container

          html += `<div class="cue-list">${v.cues.map(c => `<span class="cue-tag">${c}</span>`).join('')}</div>`;
          html += `</div>`;
        });
        html += `</div>`;
        if (m.links && m.links.length) {
          html += `<div class="links-section"><h3>Module Resources</h3><div class="link-row">`;
          m.links.forEach(l => {
            html += `<a class="link-tag" href="../../../${l.url}">📄 ${l.label}</a>`;
          });
          html += `</div></div>`;
        }
        html += `</div>`;
      });

      html += `<div class="exam-section"><h3>🎓 ${data.exam.title}</h3>`;
      html += `<p>${data.exam.description}</p>`;
      html += `<ul class="exam-scenarios">${data.exam.scenarios.map(s => `<li>${s}</li>`).join('')}</ul>`;
      html += `<a class="exam-link" href="../../../markdown_viewer.html?md=${data.exam.link}">📝 Start Exam Walkthrough</a></div>`;

      area.innerHTML = html;
      window.showModule = function(idx) {
        document.querySelectorAll('.module-card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('mod-' + idx).classList.add('active');
        document.querySelectorAll('.module-btn')[idx].classList.add('active');
      };

      // Jump to module from ?module=N (1-indexed, matching course_outline.html link)
      const urlMod = parseInt(new URLSearchParams(location.search).get('module'), 10);
      if (!isNaN(urlMod) && urlMod >= 1 && urlMod <= data.modules.length) {
        showModule(urlMod - 1);
      }
    }

    const SUPABASE_URL = localStorage.getItem('supabase_url') || 'https://rmekfsdhglyiralxvkwc.supabase.co';
    const SUPABASE_ANON_KEY = localStorage.getItem('supabase_anon_key') || '';

    async function loadFromSupabase() {
      if (!SUPABASE_URL.includes('supabase.co')) return null;
      try {
        async function sq(endpoint) {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
          });
          if (!res.ok) return null;
          return res.json();
        }
        const modules = await sq('modules?order=module_number.asc');
        const videos = await sq('videos?order=video_number.asc&select=*,video_cues(*)');
        const links = await sq('resource_links?select=*,module_id(*)');
        const outlines = await sq('outline?order=sort_order.asc');
        const scripts = await sq('scripts');
        
        if (!modules) return null;

        return {
          course: { title: 'Claude AI Certification for Architects', pipeline: 'Supabase' },
          modules: modules.map(m => ({
            id: m.module_number, title: m.title, description: m.description,
            objectives: (outlines || []).filter(o => o.module_number === m.module_number && o.content_type === 'objective').map(o => o.content),
            keyResults: (outlines || []).filter(o => o.module_number === m.module_number && o.content_type === 'key_result').map(o => o.content),
            videos: (videos || []).filter(v => v.module_id === m.id).map(v => {
              const matchedScript = (scripts || []).find(s => s.video_id === v.id);
              return {
                id: v.video_number,
                videoId: v.id,
                title: v.title,
                duration: v.duration,
                script: matchedScript ? matchedScript.script_text : v.script,
                cues: (v.video_cues || []).sort((a,b) => a.sort_order - b.sort_order).map(c => c.cue_text)
              };
            }),
            links: (links || []).filter(l => l.module_id === m.id).map(l => ({ label: l.label, url: l.url }))
          })),
          exam: { title: 'Certification Exam & Case Study', description: 'The final exam covers all 5 modules.', scenarios: [], link: 'docs/certification/exam_and_case_study.md' }
        };
      } catch (err) {
        console.error('Failed to load from Supabase:', err);
        return null;
      }
    }

    (async () => {
      let data = await loadFromSupabase();
      if (!data) {
        data = await fetch('master_script.json').then(r => r.json()).catch(() => null);
        if (data) {
          data.modules.forEach(m => {
            const fallback = FALLBACK_OUTLINES[m.id] || { objectives: [], keyResults: [] };
            m.objectives = fallback.objectives;
            m.keyResults = fallback.keyResults;
          });
        }
      }
      
      if (data) {
        // Hydrate overrides
        data.modules.forEach(m => {
          m.videos.forEach(v => {
            const override = localStorage.getItem(`script_override_${m.id}_${v.id}`);
            if (override) {
              v.script = override;
            }
          });
        });
        window.loadedData = data;
        render(data);
      } else {
        document.getElementById('content-area').innerHTML =
          '<div class="error"><h2>❌ Failed to Load</h2><p>Could not load from Supabase or local JSON.</p></div>';
      }
    })();
  </script>
</body>
</html>
