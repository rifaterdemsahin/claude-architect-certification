<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Script | Claude AI Certification</title>
  <link rel="preconnect" href="../../preprod/index.html" style="color: var(--secondary); text-decoration: none;">← Back to Pre-Production</a></p>
    </footer>
  </div>

  <script>
    const FALLBACK_OUTLINES = {
      1: {
        objectives: ["Understand Claude API anatomy, token mechanics, and production orchestration patterns."],
        keyResults: [
          "Deploy a multi-agent routing topology with security guards.",
          "Configure environment variables, VPC, and IAM for production."
        ]
      },
      2: {
        objectives: ["Build and deploy MCP servers for secure private data bridges."],
        keyResults: [
          "Deploy an MCP server on Fly.io with SQLite/PostgreSQL bridge.",
          "Implement read-only query boundaries with stdio/SSE transports."
        ]
      },
      3: {
        objectives: ["Implement zero-data retention compliance using AWS Bedrock PrivateLink."],
        keyResults: [
          "Configure VPC Interface Endpoints with Terraform.",
          "Produce audit logs and pass compliance review."
        ]
      },
      4: {
        objectives: ["Build deterministic agent routers with circuit-breaker safeguards."],
        keyResults: [
          "Implement router.py with loop detection and depth counting.",
          "Test circuit breaker against malformed input and recursion attacks."
        ]
      },
      5: {
        objectives: ["Reduce enterprise operational costs by 90% using prompt caching."],
        keyResults: [
          "Implement prefix-matching cache points achieving 90% hit rate.",
          "Deploy cache_layer.py with LRU and TTL strategies."
        ]
      }
    };

    window.toggleEdit = function(elementId, show) {
      const display = document.getElementById(`script-display-${elementId}`);
      const form = document.getElementById(`script-edit-form-${elementId}`);
      const editBtn = document.getElementById(`btn-edit-${elementId}`);
      
      if (show) {
        display.style.display = 'none';
        form.style.display = 'block';
        editBtn.style.display = 'none';
      } else {
        display.style.display = 'block';
        form.style.display = 'none';
        editBtn.style.display = 'block';
      }
    };

    window.saveScript = async function(videoId, moduleIdx, videoIdx) {
      const elementId = videoId || `local-${moduleIdx}-${videoIdx}`;
      const textArea = document.getElementById(`script-textarea-${elementId}`);
      const statusSpan = document.getElementById(`save-status-${elementId}`);
      const newScript = textArea.value.trim();

      statusSpan.textContent = 'Saving...';
      statusSpan.style.color = '#f59e0b';

      try {
        let savedSuccessfully = false;
        const isSupabaseConfigured = SUPABASE_URL.includes('supabase.co') && SUPABASE_ANON_KEY;

        if (isSupabaseConfigured && videoId) {
          // Check if record exists
          const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/scripts?video_id=eq.${videoId}`, {
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            }
          });
          const existing = await checkRes.json();
          
          let method = 'POST';
          let url = `${SUPABASE_URL}/rest/v1/scripts`;
          let headers = {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
          };

          if (existing && existing.length > 0) {
            method = 'PATCH';
            url = `${SUPABASE_URL}/rest/v1/scripts?video_id=eq.${videoId}`;
          }

          const body = {
            video_id: parseInt(videoId),
            script_text: newScript,
            updated_at: new Date().toISOString()
          };

          const saveRes = await fetch(url, {
            method,
            headers,
            body: JSON.stringify(body)
          });

          if (saveRes.ok) {
            savedSuccessfully = true;
          }
        }

        // Cache update locally
        localStorage.setItem(`script_override_${moduleIdx + 1}_${videoIdx}`, newScript);
        
        // Update loaded data memory
        const vTarget = window.loadedData.modules[moduleIdx].videos.find(v => v.id === videoIdx);
        if (vTarget) vTarget.script = newScript;

        document.getElementById(`script-display-${elementId}`).textContent = newScript;
        toggleEdit(elementId, false);

        statusSpan.textContent = savedSuccessfully ? '✓ Saved to Supabase' : '✓ Saved locally';
        statusSpan.style.color = '#10b981';
        setTimeout(() => { statusSpan.textContent = ''; }, 3000);

      } catch (err) {
        console.error(err);
        statusSpan.textContent = '❌ Save error';
        statusSpan.style.color = '#ef4444';
      }
    };

    function render(data) {
      const nav = document.getElementById('module-nav');
      const area = document.getElementById('content-area');
      let html = '';

      nav.innerHTML = data.modules.map((m, i) =>
        `<button class="module-btn${i === 0 ? ' active' : ''}" onclick="showModule(${i})">M${m.id}: ${m.title}</button>`
      ).join('');

      data.modules.forEach((m, mi) => {
        html += `<div class="module-card${mi === 0 ? ' active' : ''}" id="mod-${mi}">`;
        html += `<h2>Module ${m.id}: ${m.title}</h2>`;
        html += `<div class="module-desc">${m.description}</div>`;

        // Render Objectives & Key Results
        const objectives = m.objectives || [];
        const keyResults = m.keyResults || [];
        if (objectives.length || keyResults.length) {
          html += `<div class="objectives-kr-container">`;
          
          if (objectives.length) {
            html += `<div class="obj-box">`;
            html += `<h4>🎯 Module Objectives</h4>`;
            html += `<ul>${objectives.map(o => `<li>${o}</li>`).join('')}</ul>`;
            html += `</div>`;
          }
          
          if (keyResults.length) {
            html += `<div class="kr-box">`;
            html += `<h4>🔑 Key Results</h4>`;
            html += `<ul>${keyResults.map(k => `<li>${k}</li>`).join('')}</ul>`;
            html += `</div>`;
          }
          
          html += `</div>`;
        }

        html += `<div class="video-list">`;
        m.videos.forEach(v => {
          const elementId = v.videoId || `local-${mi}-${v.id}`;
          html += `<div class="video-card">`;
          html += `<div class="video-header"><span class="video-title">🎬 Video ${v.id}: ${v.title}</span><span class="video-duration">${v.duration}</span></div>`;
          
          // Editable Script Block
          html += `<div class="video-script-container" id="script-container-${elementId}">`;
          html += `<div class="script-display" id="script-display-${elementId}">${v.script}</div>`;
          html += `<div class="script-edit-form" id="script-edit-form-${elementId}" style="display: none;">`;
          html += `<textarea class="script-textarea" id="script-textarea-${elementId}">${v.script}</textarea>`;
          html += `<div class="edit-actions">`;
          html += `<button class="btn-save" onclick="saveScript('${v.videoId || ''}', ${mi}, ${v.id})">Save Changes</button>`;
          html += `<button class="btn-cancel" onclick="toggleEdit('${elementId}', false)">Cancel</button>`;
          html += `</div>`;
          html += `</div>`;
          html += `<div class="edit-trigger-row">`;
          html += `<button class="btn-edit" id="btn-edit-${elementId}" onclick="toggleEdit('${elementId}', true)">✏️ Edit Script</button>`;
          html += `<span class="save-status" id="save-status-${elementId}"></span>`;
          html += `</div>`;
          html += `</div>`; // end script container

          html += `<div class="cue-list">${v.cues.map(c => `<span class="cue-tag">${c}</span>`).join('')}</div>`;
          html += `</div>`;
        });
        html += `</div>`;
        if (m.links && m.links.length) {
          html += `<div class="links-section"><h3>Module Resources</h3><div class="link-row">`;
          m.links.forEach(l => {
            html += `<a class="link-tag" href="../../../${l.url}">📄 ${l.label}</a>`;
          });
          html += `</div></div>`;
        }
        html += `</div>`;
      });

      html += `<div class="exam-section"><h3>🎓 ${data.exam.title}</h3>`;
      html += `<p>${data.exam.description}</p>`;
      html += `<ul class="exam-scenarios">${data.exam.scenarios.map(s => `<li>${s}</li>`).join('')}</ul>`;
      html += `<a class="exam-link" href="../../../markdown_viewer.html?md=${data.exam.link}">📝 Start Exam Walkthrough</a></div>`;

      area.innerHTML = html;
      window.showModule = function(idx) {
        document.querySelectorAll('.module-card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('mod-' + idx).classList.add('active');
        document.querySelectorAll('.module-btn')[idx].classList.add('active');
      };
    }

    const SUPABASE_URL = localStorage.getItem('supabase_url') || 'https://rmekfsdhglyiralxvkwc.supabase.co';
    const SUPABASE_ANON_KEY = localStorage.getItem('supabase_anon_key') || '';
    const SUPABASE_CONFIGURED = SUPABASE_URL.includes('supabase.co') && SUPABASE_ANON_KEY.length > 10;

    async function loadFromSupabase() {
      if (!SUPABASE_CONFIGURED) return null;
      try {
        async function sq(endpoint) {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
          });
          if (!res.ok) return null;
          return res.json();
        }
        const modules = await sq('modules?order=module_number.asc');
        const videos = await sq('videos?order=video_number.asc&select=*,video_cues(*)');
        const links = await sq('resource_links?select=*,module_id(*)');
        const outlines = await sq('outline?order=sort_order.asc');
        const scripts = await sq('scripts');
        
        if (!modules) return null;

        return {
          course: { title: 'Claude AI Certification for Architects', pipeline: 'Supabase' },
          modules: modules.map(m => ({
            id: m.module_number, title: m.title, description: m.description,
            objectives: (outlines || []).filter(o => o.module_number === m.module_number && o.content_type === 'objective').map(o => o.content),
            keyResults: (outlines || []).filter(o => o.module_number === m.module_number && o.content_type === 'key_result').map(o => o.content),
            videos: (videos || []).filter(v => v.module_id === m.id).map(v => {
              const matchedScript = (scripts || []).find(s => s.video_id === v.id);
              return {
                id: v.video_number,
                videoId: v.id,
                title: v.title,
                duration: v.duration,
                script: matchedScript ? matchedScript.script_text : v.script,
                cues: (v.video_cues || []).sort((a,b) => a.sort_order - b.sort_order).map(c => c.cue_text)
              };
            }),
            links: (links || []).filter(l => l.module_id === m.id).map(l => ({ label: l.label, url: l.url }))
          })),
          exam: { title: 'Certification Exam & Case Study', description: 'The final exam covers all 5 modules.', scenarios: [], link: 'docs/certification/exam_and_case_study.md' }
        };
      } catch (err) {
        console.error('Failed to load from Supabase:', err);
        return null;
      }
    }

    (async () => {
      let data = null;

      if (SUPABASE_CONFIGURED) {
        data = await loadFromSupabase();
      } else {
        console.info('Supabase not configured — using master_script.json fallback.');
      }

      if (!data) {
        data = await fetch('master_script.json').then(r => r.json()).catch(() => null);
        if (data) {
          data.modules.forEach(m => {
            const fallback = FALLBACK_OUTLINES[m.id] || { objectives: [], keyResults: [] };
            m.objectives = fallback.objectives;
            m.keyResults = fallback.keyResults;
          });
        }
      }
      
      if (data) {
        // Hydrate overrides
        data.modules.forEach(m => {
          m.videos.forEach(v => {
            const override = localStorage.getItem(`script_override_${m.id}_${v.id}`);
            if (override) {
              v.script = override;
            }
          });
        });
        window.loadedData = data;
        render(data);
      } else {
        document.getElementById('content-area').innerHTML =
          '<div class="error"><h2>❌ Failed to Load</h2><p>Could not load from Supabase or local JSON.</p></div>';
      }
    })();
  </script>
</body>
</html>
