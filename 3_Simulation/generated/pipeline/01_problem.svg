<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with subtle gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    <clipPath id="rounded">
      <rect width="600" height="300" rx="16" />
    </clipPath>
  </defs>
  
  <rect width="600" height="300" rx="16" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Header Section -->
  <rect width="600" height="60" fill="rgba(139, 92, 246, 0.1)"/>
  <rect width="4" height="60" fill="#8b5cf6"/>
  <text x="20" y="38" font-family="sans-serif" font-size="24" fill="#8b5cf6" font-weight="bold">01 | PROBLEM</text>
  <text x="580" y="38" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="end" font-weight="600">PRE-PRODUCTION</text>

  <!-- Description Section -->
  <text x="20" y="85" font-family="sans-serif" font-size="14" fill="#f8fafc">
    <tspan x="20" dy="0">Identify and articulate the core problem the course will solve.</tspan>
    <tspan x="20" dy="20">What gap exists in the market? Who is affected and why?</tspan>
  </text>

  <!-- Info Grid -->
  <!-- Inputs -->
  <rect x="20" y="130" width="275" height="100" rx="10" fill="rgba(6, 182, 212, 0.05)" stroke="rgba(6, 182, 212, 0.15)"/>
  <text x="35" y="152" font-family="sans-serif" font-size="12" fill="#06b6d4" font-weight="bold">📥 INPUTS</text>
  <text x="35" y="172" font-family="sans-serif" font-size="11" fill="#94a3b8">
    <tspan x="35" dy="0">• Market research &amp; gap analysis</tspan>
    <tspan x="35" dy="16">• Learner pain points &amp; feedback</tspan>
    <tspan x="35" dy="16">• Industry trends &amp; tech shifts</tspan>
  </text>

  <!-- Outputs -->
  <rect x="305" y="130" width="275" height="100" rx="10" fill="rgba(16, 185, 129, 0.05)" stroke="rgba(16, 185, 129, 0.15)"/>
  <text x="320" y="152" font-family="sans-serif" font-size="12" fill="#10b981" font-weight="bold">📤 OUTPUTS</text>
  <text x="320" y="172" font-family="sans-serif" font-size="11" fill="#94a3b8">
    <tspan x="320" dy="0">• Problem statement document</tspan>
    <tspan x="320" dy="16">• Target audience definition</tspan>
    <tspan x="320" dy="16">• Success criteria &amp; KPIs</tspan>
  </text>

  <!-- Tools Section -->
  <rect x="20" y="245" width="560" height="40" rx="10" fill="rgba(245, 158, 11, 0.05)" stroke="rgba(245, 158, 11, 0.15)"/>
  <text x="35" y="270" font-family="sans-serif" font-size="12" fill="#f59e0b" font-weight="bold">🛠 TOOLS:</text>
  <text x="100" y="270" font-family="sans-serif" font-size="11" fill="#f8fafc">Claude, Perplexity, Supabase, Obsidian, Reddit</text>

  <!-- Iconic Graphic -->
  <circle cx="540" cy="90" r="30" fill="#8b5cf6" opacity="0.1"/>
  <text x="540" y="100" font-family="serif" font-size="40" fill="#8b5cf6" text-anchor="middle" font-weight="bold">?</text>
</svg>
