<svg width="400" height="160" viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="160" rx="12" fill="#0f172a" />
  <text x="20" y="40" font-family="sans-serif" font-size="14" fill="#94a3b8" font-weight="bold">STAGE 10: PLAYLIST</text>
  <!-- Input -->
  <rect x="20" y="60" width="150" height="80" rx="8" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.3)" />
  <text x="30" y="80" font-family="sans-serif" font-size="10" fill="#06b6d4">INPUT: Rendered Videos</text>
  <rect x="50" y="95" width="40" height="30" rx="4" fill="white" opacity="0.2" />
  <polygon points="65,105 65,115 75,110" fill="white" />
  
  <!-- Arrow -->
  <path d="M 180 100 L 220 100" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowhead)" />
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6" />
    </marker>
  </defs>

  <!-- Output -->
  <rect x="230" y="60" width="150" height="80" rx="8" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" />
  <text x="240" y="80" font-family="sans-serif" font-size="10" fill="#10b981">OUTPUT: YouTube Playlist</text>
  <rect x="250" y="95" width="10" height="30" fill="#f59e0b" opacity="0.4" />
  <rect x="270" y="95" width="80" height="8" rx="2" fill="white" opacity="0.1" />
  <rect x="270" y="106" width="80" height="8" rx="2" fill="white" opacity="0.1" />
  <rect x="270" y="117" width="80" height="8" rx="2" fill="white" opacity="0.1" />
</svg>
