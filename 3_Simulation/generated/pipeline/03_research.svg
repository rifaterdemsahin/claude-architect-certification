<svg width="400" height="160" viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="160" rx="12" fill="#0f172a" />
  <text x="20" y="40" font-family="sans-serif" font-size="14" fill="#94a3b8" font-weight="bold">STAGE 03: RESEARCH</text>
  <!-- Input -->
  <rect x="20" y="60" width="150" height="80" rx="8" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.3)" />
  <text x="30" y="80" font-family="sans-serif" font-size="10" fill="#06b6d4">INPUT: Tech Specs</text>
  <path d="M 50 100 L 140 100" stroke="white" stroke-width="1" stroke-dasharray="4" />
  
  <!-- Arrow -->
  <path d="M 180 100 L 220 100" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowhead)" />
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6" />
    </marker>
  </defs>

  <!-- Output -->
  <rect x="230" y="60" width="150" height="80" rx="8" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" />
  <text x="240" y="80" font-family="sans-serif" font-size="10" fill="#10b981">OUTPUT: Raw Assets</text>
  <circle cx="270" cy="110" r="10" fill="#06b6d4" opacity="0.5" />
  <rect x="290" y="100" width="20" height="20" fill="#f59e0b" opacity="0.5" />
  <polygon points="325,100 340,120 310,120" fill="#ec4899" opacity="0.5" />
</svg>
